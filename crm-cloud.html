<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Self Storage Acquisition Tracker</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f1f5f9;min-height:100vh;padding:20px}
.app-container{max-width:1400px;margin:0 auto;background:white;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.10);overflow:hidden}
.header{background:#1e293b;color:white;padding:30px;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:28px;font-weight:700}
.header-stats{display:flex;gap:30px}
.stat{text-align:center;cursor:pointer;padding:8px 12px;border-radius:10px;transition:background .18s,transform .15s;border:2px solid transparent}
.stat:hover{background:rgba(255,255,255,.18);transform:translateY(-2px);border-color:rgba(255,255,255,.4)}
.stat:active{transform:translateY(0)}
.stat-value{font-size:24px;font-weight:700}
.stat-label{font-size:12px;opacity:.75;text-transform:uppercase;letter-spacing:.5px}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#4ade80}
.sync-dot.syncing{background:#fbbf24;animation:pulse 1s infinite}
.sync-dot.error{background:#f87171}
.sync-dot.not-configured{background:#94a3b8}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.main-content{display:flex}
.sidebar{width:250px;background:#f8fafc;border-right:1px solid #e2e8f0;padding:20px;min-height:600px;display:flex;flex-direction:column}
.nav-item{padding:12px 16px;margin-bottom:4px;border-radius:8px;cursor:pointer;transition:all .15s;font-weight:500;color:#475569;font-size:14px}
.nav-item:hover{background:#e2e8f0;color:#1e293b}
.nav-item.active{background:#2563eb;color:white}
.content-area{flex:1;padding:30px;overflow-y:auto;max-height:calc(100vh - 140px)}
.btn{padding:10px 20px;border:none;border-radius:8px;cursor:pointer;font-weight:600;transition:all .2s;display:inline-flex;align-items:center;gap:8px}
.btn-primary{background:#2563eb;color:white}
.btn-primary:hover{background:#1d4ed8;transform:translateY(-1px)}
.btn-secondary{background:#f1f5f9;color:#475569;border:1px solid #e2e8f0}
.btn-secondary:hover{background:#e2e8f0;color:#1e293b}
.btn-success{background:#16a34a;color:white}
.btn-success:hover{background:#15803d}
.btn-danger{background:#dc2626;color:white}
.btn-warning{background:#f59e0b;color:white}
.btn-sm{padding:6px 12px;font-size:14px}
.search-bar{width:100%;padding:12px 16px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:14px;margin-bottom:12px;background:#f8fafc}
.search-bar:focus{outline:none;border-color:#2563eb;background:white}
.contact-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;margin-top:16px}
.contact-card{background:white;border:1.5px solid #e2e8f0;border-radius:12px;padding:20px;transition:all .2s;cursor:pointer;border-left:4px solid #e2e8f0}
.contact-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08);transform:translateY(-2px)}
.contact-card.urgency-fresh{border-left-color:#22c55e}
.contact-card.urgency-moderate{border-left-color:#f59e0b}
.contact-card.urgency-stale{border-left-color:#ef4444}
.contact-header{display:flex;justify-content:space-between;align-items:start;margin-bottom:12px}
.contact-name{font-size:16px;font-weight:600;color:#0f172a}
.contact-company{font-size:13px;color:#64748b;margin-bottom:8px}
.contact-info{font-size:13px;color:#64748b;margin-bottom:4px}
.card-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.stage-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.stage-new{background:#dbeafe;color:#1e40af}
.stage-contacted{background:#ede9fe;color:#5b21b6}
.stage-followup{background:#fef3c7;color:#92400e}
.stage-qualified{background:#dcfce7;color:#166534}
.stage-won{background:#bbf7d0;color:#14532d}
.stage-lost{background:#fee2e2;color:#991b1b}
.stage-fellthrough{background:#ffedd5;color:#9a3412}
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(15,23,42,.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal-content{background:white;border-radius:14px;padding:30px;box-shadow:0 20px 60px rgba(0,0,0,.18);max-width:600px;width:100%;max-height:90vh;overflow-y:auto}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-title{font-size:22px;font-weight:700;color:#0f172a}
.close-btn{background:none;border:none;cursor:pointer;padding:4px;color:#94a3b8;font-size:24px;line-height:1}
.form-group{margin-bottom:20px}
.form-label{display:block;margin-bottom:7px;font-weight:600;color:#334155;font-size:13px}
.form-input,.form-select,.form-textarea{width:100%;padding:10px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:14px;font-family:inherit;background:#f8fafc;color:#0f172a}
.form-input:focus,.form-select:focus,.form-textarea:focus{outline:none;border-color:#2563eb;background:white}
.form-textarea{resize:vertical;min-height:100px}
.detail-header{display:flex;justify-content:space-between;align-items:start;margin-bottom:30px;padding-bottom:20px;border-bottom:1.5px solid #e2e8f0}
.detail-title{font-size:26px;font-weight:700;margin-bottom:8px}
.detail-subtitle{font-size:15px;color:#64748b}
.info-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;margin-bottom:30px}
.info-item{padding:16px;background:#f8fafc;border-radius:8px;border:1px solid #e2e8f0}
.info-label{font-weight:600;color:#64748b;margin-bottom:4px;font-size:12px;text-transform:uppercase;letter-spacing:.5px}
.info-value{color:#0f172a;font-size:15px}
.section-title{font-size:18px;font-weight:700;margin-bottom:14px;color:#0f172a}
.communication-list{display:flex;flex-direction:column;gap:16px}
.communication-item{background:#f8fafc;padding:16px;border-radius:8px;border:1px solid #e2e8f0;border-left:3px solid #2563eb}
.comm-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.comm-type{font-weight:600;color:#1e293b;font-size:14px}
.comm-date{font-size:12px;color:#94a3b8}
.comm-message{color:#475569;line-height:1.6;font-size:14px}
.action-buttons{display:flex;gap:10px;margin-top:20px}
.empty-state{text-align:center;padding:60px 20px;color:#94a3b8}
.empty-state-icon{font-size:48px;margin-bottom:16px;opacity:.5}
.pipeline-board{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}
.pipeline-column{background:#f8fafc;border-radius:12px;padding:14px;display:flex;flex-direction:column;border:1px solid #e2e8f0}
.pipeline-header{font-weight:700;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.pipeline-count{background:white;padding:2px 8px;border-radius:12px;font-size:12px}
.pipeline-cards{display:flex;flex-direction:column;gap:12px;overflow-y:auto;max-height:380px;padding-right:4px}
.pipeline-cards::-webkit-scrollbar{width:6px}
.pipeline-cards::-webkit-scrollbar-track{background:#f1f5f9;border-radius:3px}
.pipeline-cards::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
.pipeline-cards::-webkit-scrollbar-thumb:hover{background:#94a3b8}
.pipeline-card{background:white;padding:12px;border-radius:8px;cursor:pointer;transition:all .15s;border:1.5px solid #e2e8f0;flex-shrink:0}
.pipeline-card:hover{border-color:#2563eb;box-shadow:0 2px 8px rgba(37,99,235,.12)}
.pipeline-card-name{font-weight:600;margin-bottom:4px}
.pipeline-card-company{font-size:12px;color:#64748b}
.tip-box{margin-top:20px;padding:14px;background:#fffbeb;border-radius:8px;font-size:13px;border:1px solid #fde68a;color:#78350f}
.setup-banner{background:#fffbeb;border:1.5px solid #fde68a;border-radius:8px;padding:20px;margin:20px}
.setup-banner h3{margin-bottom:10px;color:#78350f}
.setup-banner p{margin-bottom:10px;color:#92400e;font-size:14px}
.followup-override-box{background:#fffbeb;border:1.5px solid #fde68a;border-radius:8px;padding:14px;margin-top:6px}
.toggle-row{display:flex;align-items:center;gap:10px;cursor:pointer}
.toggle-switch{position:relative;width:42px;height:24px;flex-shrink:0}
.toggle-switch input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#cbd5e1;border-radius:24px;transition:.3s}
.toggle-slider:before{position:absolute;content:"";height:18px;width:18px;left:3px;bottom:3px;background:white;border-radius:50%;transition:.3s}
.toggle-switch input:checked+.toggle-slider{background:#2563eb}
.toggle-switch input:checked+.toggle-slider:before{transform:translateX(18px)}
.toggle-label{font-size:14px;font-weight:600;color:#78350f;user-select:none}
.override-days-row{display:flex;align-items:center;gap:8px;margin-top:10px}
.filter-banner{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding:10px 14px;background:#eff6ff;border-radius:8px;font-size:14px;border:1px solid #bfdbfe;color:#1e40af}
/* ── Mobile compact list view ── */
@media(max-width:768px){
.contact-grid{display:flex;flex-direction:column;gap:0;margin-top:8px;border-radius:12px;overflow:hidden;border:1.5px solid #e2e8f0}
.contact-card{border-radius:0;border:none;border-bottom:1px solid #e2e8f0;border-left:4px solid #e2e8f0;padding:0;position:relative;overflow:hidden;transform:none!important}
.contact-card:last-child{border-bottom:none}
.contact-card:hover{box-shadow:none;transform:none}
.contact-card.urgency-fresh{border-left-color:#22c55e}
.contact-card.urgency-moderate{border-left-color:#f59e0b}
.contact-card.urgency-stale{border-left-color:#ef4444}
/* hide desktop card innards on mobile */
.contact-card .contact-header,
.contact-card .card-tags,
.contact-card .contact-info,
.contact-card>div:last-child{display:none!important}
/* show the mobile row instead */
.mobile-row{display:flex!important;align-items:center;padding:12px 14px;gap:10px;background:white;position:relative;z-index:1;transition:transform .25s ease}
.mobile-row-main{flex:1;min-width:0}
.mobile-row-name{font-size:15px;font-weight:600;color:#0f172a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mobile-row-sub{font-size:12px;color:#64748b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.mobile-row-meta{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap;align-items:center}
.mobile-row-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.mobile-chevron{font-size:18px;color:#cbd5e1;margin-left:4px;flex-shrink:0}
/* swipe action */
.mobile-swipe-action{position:absolute;right:0;top:0;bottom:0;width:90px;background:#2563eb;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:3px;color:white;font-size:11px;font-weight:700;z-index:0;transition:width .25s ease}
.mobile-swipe-action span{font-size:20px}
.mobile-row.swiped{transform:translateX(-90px)}
}
/* hide mobile row on desktop */
.mobile-row{display:none}

.list-toolbar{display:flex;gap:10px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.toolbar-select{padding:8px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:13px;font-family:inherit;background:#f8fafc;cursor:pointer;color:#475569;transition:border-color .2s}
.toolbar-select:focus{outline:none;border-color:#2563eb}
.toolbar-select.active{border-color:#2563eb;background:#eff6ff;color:#1e40af;font-weight:600}
/* ── Tag pills ── */
.tag-pill{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;user-select:none;white-space:nowrap;transition:box-shadow .15s}
.tag-pill.filter-active{box-shadow:0 0 0 2px #2563eb}
.tag-remove{background:none;border:none;cursor:pointer;font-size:13px;line-height:1;padding:0 0 0 2px;color:inherit;opacity:.65}
.tag-remove:hover{opacity:1}
/* ── Tag input ── */
.tag-input-wrap{display:flex;flex-wrap:wrap;gap:6px;align-items:center;padding:8px 10px;border:1.5px solid #e2e8f0;background:#f8fafc;border-radius:8px;cursor:text;min-height:44px;transition:border-color .2s}
.tag-input-wrap:focus-within{border-color:#2563eb;background:white}
.tag-input-field{border:none;outline:none;font-size:14px;font-family:inherit;min-width:130px;flex:1;padding:2px 4px;background:transparent}
/* ── Tag filter bar ── */
.tag-filter-bar{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:12px;padding:10px 14px;background:#f8fafc;border-radius:8px;border:1px solid #e2e8f0}
.hidden{display:none!important}
.metrics-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
.metric-item{padding:14px;background:#eff6ff;border-radius:8px;border:1px solid #bfdbfe}
.metric-label{font-weight:600;color:#64748b;margin-bottom:4px;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
.metric-value{color:#0f172a;font-size:15px;font-weight:600}
.financial-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
.financial-item{padding:14px;background:#f0fdf4;border-radius:8px;border:1px solid #bbf7d0}
.financial-label{font-weight:600;color:#64748b;margin-bottom:4px;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
.financial-value{color:#0f172a;font-size:15px;font-weight:600}
.task-list{display:flex;flex-direction:column;gap:10px}
.task-item{background:#fff;border:1.5px solid #e2e8f0;border-radius:8px;padding:14px;display:flex;align-items:flex-start;gap:12px;transition:all .2s}
.task-item.overdue{border-color:#fecaca;background:#fff5f5}
.task-item.done{opacity:.5;background:#f8fafc}
.task-item.done .task-title{text-decoration:line-through;color:#94a3b8}
.task-checkbox{width:20px;height:20px;cursor:pointer;margin-top:2px;accent-color:#2563eb;flex-shrink:0}
.task-content{flex:1}
.task-title{font-weight:600;color:#0f172a;margin-bottom:4px}
.task-meta{font-size:12px;color:#64748b;display:flex;gap:10px;align-items:center}
.task-due{font-size:12px}
.task-due.overdue{color:#dc2626;font-weight:600}
.task-due.soon{color:#d97706;font-weight:600}
.task-due.ok{color:#16a34a}
.pipeline-value{font-size:11px;color:#16a34a;font-weight:600;margin-top:4px}
.header-pipeline-value{font-size:12px;opacity:.8;margin-top:2px}
.days-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:700;margin-top:5px}
.days-badge.fresh{background:#dcfce7;color:#166534}
.days-badge.moderate{background:#fef3c7;color:#92400e}
.days-badge.stale{background:#fee2e2;color:#991b1b}
.chart-container{background:#f8fafc;border-radius:12px;border:1px solid #e2e8f0;padding:20px;margin-bottom:28px}
.chart-title{font-size:16px;font-weight:700;color:#0f172a;margin-bottom:4px}
.chart-subtitle{font-size:12px;color:#64748b;margin-bottom:16px}
.chart-wrap{position:relative;width:100%}
.chart-legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:12px;color:#475569}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.funnel-row{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.funnel-label{width:140px;font-size:13px;color:#475569;text-align:right;flex-shrink:0}
.funnel-bar-wrap{flex:1;background:#e2e8f0;border-radius:4px;height:22px;overflow:hidden}
.funnel-bar{height:100%;border-radius:4px;transition:width .5s ease;display:flex;align-items:center;padding-left:8px}
.funnel-count{font-size:12px;font-weight:700;color:white;white-space:nowrap}
.analytics-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:28px}
.analytics-card{background:#f8fafc;border-radius:12px;padding:18px;border:1px solid #e2e8f0}
.analytics-card-title{font-size:12px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #f1f5f9}
.stat-row:last-child{border-bottom:none}
.stat-row-label{font-size:13px;color:#475569}
.stat-row-value{font-size:14px;font-weight:700;color:#0f172a}
@media(max-width:768px){
body{padding:0}
.app-container{border-radius:0;min-height:100vh}
.header{flex-direction:column;gap:20px;padding:20px}
.header h1{font-size:22px}
.header-stats{width:100%;justify-content:space-around}
.main-content{flex-direction:column}
.sidebar{width:100%;display:flex;flex-direction:row;overflow-x:auto;padding:10px;border-right:none;border-bottom:1px solid #e2e8f0;min-height:auto;align-items:center}
.sidebar>div:last-child{display:flex!important;flex-direction:row;align-items:center;margin-top:0;padding-top:0;border-top:none;border-left:1px solid #e2e8f0;padding-left:8px;margin-left:4px}
.mobile-hide-sync{display:none!important}
.nav-item{white-space:nowrap;margin-right:8px;margin-bottom:0}
.content-area{padding:12px;max-height:none}
.info-grid{grid-template-columns:1fr}
.pipeline-board{grid-template-columns:1fr}
.pipeline-cards{max-height:none;overflow-y:visible}
.detail-header{flex-direction:column;gap:15px}
.modal{padding:10px}
.modal-content{padding:20px}
.metrics-grid,.financial-grid{grid-template-columns:1fr}
.analytics-grid{grid-template-columns:1fr}
.list-toolbar{gap:6px}
.toolbar-select{font-size:12px;padding:7px 9px}
}
</style>
</head>
<body>
<div id="root"><div style="display:flex;justify-content:center;align-items:center;min-height:100vh;flex-direction:column;color:white;text-align:center;padding:20px"><h2 style="margin-bottom:20px">Loading CRM...</h2><p>If this message persists, please refresh the page.</p></div></div>
<script type="text/babel">
const{useState,useEffect,useRef}=React;
const INACTIVE=['won','lost','fellthrough'];

/* ── Tag colour palette – deterministic from tag text ── */
const TAG_PALETTES=[
  {bg:'#e0e7ff',color:'#3730a3'},{bg:'#fce7f3',color:'#9d174d'},
  {bg:'#dcfce7',color:'#166534'},{bg:'#fef3c7',color:'#92400e'},
  {bg:'#fee2e2',color:'#991b1b'},{bg:'#ede9fe',color:'#5b21b6'},
  {bg:'#e0f2fe',color:'#075985'},{bg:'#ffedd5',color:'#9a3412'},
];
function tagPalette(tag){
  let h=0;for(let i=0;i<tag.length;i++)h=(h*31+tag.charCodeAt(i))&0xffff;
  return TAG_PALETTES[h%TAG_PALETTES.length];
}
function TagPill({tag,onRemove,onClick,active}){
  const{bg,color}=tagPalette(tag);
  return(
    <span className={`tag-pill${active?' filter-active':''}`} style={{background:bg,color}}
      onClick={onClick}>
      {tag}
      {onRemove&&<button className="tag-remove" onClick={e=>{e.stopPropagation();onRemove(tag)}}>×</button>}
    </span>
  );
}
function TagInput({tags=[],onChange}){
  const[val,setVal]=useState('');
  const ref=useRef(null);
  const add=raw=>{
    const t=raw.trim().toLowerCase().replace(/,/g,'');
    if(t&&!tags.includes(t))onChange([...tags,t]);
    setVal('');
  };
  const handleKey=e=>{
    if(e.key==='Enter'||e.key===','){e.preventDefault();add(val)}
    else if(e.key==='Backspace'&&val===''&&tags.length)onChange(tags.slice(0,-1));
  };
  return(
    <div className="tag-input-wrap" onClick={()=>ref.current?.focus()}>
      {tags.map(t=><TagPill key={t} tag={t} onRemove={tag=>onChange(tags.filter(x=>x!==tag))}/>)}
      <input ref={ref} className="tag-input-field" value={val}
        onChange={e=>setVal(e.target.value)} onKeyDown={handleKey}
        onBlur={()=>val.trim()&&add(val)}
        placeholder={tags.length?'':'Add tags (Enter to confirm)…'}/>
    </div>
  );
}

/* ── Sort helpers ── */
const STAGE_ORDER={new:0,contacted:1,followup:2,qualified:3,won:4,lost:5,fellthrough:6};
function lastContactedDate(c){
  if(!c.communications||!c.communications.length)return null;
  return new Date(c.communications[c.communications.length-1].date);
}
function applySort(list,sort){
  const s=[...list];
  switch(sort){
    case'date-new':return s.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
    case'date-old':return s.sort((a,b)=>new Date(a.createdAt)-new Date(b.createdAt));
    case'contacted-recent':return s.sort((a,b)=>{
      const da=lastContactedDate(a),db=lastContactedDate(b);
      if(!da&&!db)return 0;if(!da)return 1;if(!db)return -1;return db-da;
    });
    case'contacted-overdue':return s.sort((a,b)=>{
      const da=lastContactedDate(a),db=lastContactedDate(b);
      if(!da&&!db)return 0;if(!da)return -1;if(!db)return 1;return da-db;
    });
    case'stage':return s.sort((a,b)=>(STAGE_ORDER[a.stage]||0)-(STAGE_ORDER[b.stage]||0));
    case'name':return s.sort((a,b)=>(a.propertyName||a.name||'').localeCompare(b.propertyName||b.name||''));
    default:return s;
  }
}

/* ── CloudSync ── */
const CloudSync={
  scriptUrl:localStorage.getItem('sheetsScriptUrl')||'',
  isConfigured(){return this.scriptUrl!==''},
  configure(url){this.scriptUrl=url;localStorage.setItem('sheetsScriptUrl',url)},
  async sync(data){
    if(!this.isConfigured())return{success:false,error:'Not configured'};
    try{const fd=new FormData();fd.append('data',JSON.stringify({action:'save',data}));await fetch(this.scriptUrl,{method:'POST',body:fd});return{success:true}}
    catch(e){if(e.message.includes('CORS')||e.message.includes('Failed to fetch'))return{success:true};return{success:false,error:e.message}}
  },
  async load(){
    if(!this.isConfigured())return{success:false,error:'Not configured'};
    try{const r=await fetch(this.scriptUrl+'?action=load');if(!r.ok)return{success:false,error:'HTTP '+r.status};const d=await r.json();return{success:true,data:d.contacts||[]}}
    catch(e){return{success:false,error:e.message}}
  },
  async testConnection(){
    if(!this.isConfigured())return{success:false,error:'Not configured'};
    try{await fetch(this.scriptUrl+'?action=test');return{success:true}}
    catch(e){return{success:false,error:e.message}}
  }
};

/* ── App ── */
function App(){
  const[contacts,setContacts]=useState([]);
  const[view,setView]=useState('dashboard');
  const[filter,setFilter]=useState(null);
  const[selected,setSelected]=useState(null);
  const[showAdd,setShowAdd]=useState(false);
  const[showSetup,setShowSetup]=useState(false);
  const[showSettings,setShowSettings]=useState(false);
  const[search,setSearch]=useState('');
  const[syncStatus,setSyncStatus]=useState('not-configured');
  const[followUpDays,setFollowUpDays]=useState(parseInt(localStorage.getItem('followUpDays'))||3);
  const[sortBy,setSortBy]=useState('date-new');
  const[stageFilter,setStageFilter]=useState('');
  const[tagFilter,setTagFilter]=useState('');
  const[quickLogContact,setQuickLogContact]=useState(null);

  useEffect(()=>{
    const saved=localStorage.getItem('crmContacts');
    if(saved)setContacts(JSON.parse(saved));
    if(CloudSync.isConfigured())loadCloud();
    else setSyncStatus('not-configured');
  },[]);

  const save=nc=>{localStorage.setItem('crmContacts',JSON.stringify(nc));doSync(nc)};
  const doSync=async data=>{
    if(!CloudSync.isConfigured())return;
    setSyncStatus('syncing');
    const r=await CloudSync.sync(data);
    if(r.success){setSyncStatus('synced');setTimeout(()=>setSyncStatus('idle'),2000)}else setSyncStatus('error');
  };
  const loadCloud=async()=>{
    setSyncStatus('syncing');
    const r=await CloudSync.load();
    if(r.success&&r.data.length>0){setContacts(r.data);localStorage.setItem('crmContacts',JSON.stringify(r.data));setSyncStatus('synced');setTimeout(()=>setSyncStatus('idle'),2000)}
    else setSyncStatus(r.success?'idle':'error');
  };
  const addContact=data=>{
    const nc=[...contacts,{id:Date.now(),...data,tags:data.tags||[],stage:'new',stageEnteredAt:new Date().toISOString(),stageHistory:[],communications:[],createdAt:new Date().toISOString()}];
    setContacts(nc);save(nc);setShowAdd(false);
  };
  const updateContact=(id,updates)=>{
    const existing=contacts.find(c=>c.id===id);
    let enriched={...updates};
    if(updates.stage&&existing&&updates.stage!==existing.stage){
      const history=[...(existing.stageHistory||[]),{stage:existing.stage,enteredAt:existing.stageEnteredAt||existing.createdAt,exitedAt:new Date().toISOString()}];
      enriched={...enriched,stageHistory:history,stageEnteredAt:new Date().toISOString()};
    }
    const nc=contacts.map(c=>c.id===id?{...c,...enriched}:c);
    setContacts(nc);save(nc);
    if(selected&&selected.id===id)setSelected({...selected,...enriched});
  };
  const deleteContact=id=>{
    if(confirm('Delete this contact?')){const nc=contacts.filter(c=>c.id!==id);setContacts(nc);save(nc);setSelected(null)}
  };
  const addComm=(cid,comm)=>{
    const c=contacts.find(c=>c.id===cid);
    updateContact(cid,{communications:[...(c.communications||[]),{id:Date.now(),...comm}]});
  };
  const goFiltered=f=>{setFilter(f);setStageFilter('');setTagFilter('');setView('contacts');setSelected(null);setSearch('')};
  const clearAllFilters=()=>{setFilter(null);setStageFilter('');setTagFilter('');setSearch('')};

  /* cascade: search → header filter → stage dropdown → tag → sort */
  const searched=contacts.filter(c=>{
    const t=search.toLowerCase();
    return c.name?.toLowerCase().includes(t)||c.email?.toLowerCase().includes(t)||
           c.company?.toLowerCase().includes(t)||c.phone?.toLowerCase().includes(t)||
           c.propertyName?.toLowerCase().includes(t)||(c.tags||[]).some(tag=>tag.includes(t));
  });
  const afterHeader=filter==='active'?searched.filter(c=>!INACTIVE.includes(c.stage)):filter==='won'?searched.filter(c=>c.stage==='won'):searched;
  const afterStage=stageFilter?afterHeader.filter(c=>c.stage===stageFilter):afterHeader;
  const afterTag=tagFilter?afterStage.filter(c=>(c.tags||[]).includes(tagFilter)):afterStage;
  const displayedContacts=applySort(afterTag,sortBy);

  const allTags=[...new Set(contacts.flatMap(c=>c.tags||[]))].sort();
  const activeContacts=contacts.filter(c=>!INACTIVE.includes(c.stage));
  const pipelineValue=activeContacts.reduce((sum,c)=>sum+(parseFloat(c.askingPrice)||parseFloat(c.estimatedValue)||0),0);
  const fmtM=v=>v>=1000000?`$${(v/1000000).toFixed(1)}M`:v>=1000?`$${(v/1000).toFixed(0)}K`:`$${v.toFixed(0)}`;
  const stats={total:contacts.length,active:activeContacts.length,won:contacts.filter(c=>c.stage==='won').length,pipelineValue};
  const syncLabel=!CloudSync.isConfigured()?'Not Connected':syncStatus==='syncing'?'Syncing...':syncStatus==='synced'?'Synced ✓':syncStatus==='error'?'Sync Error':'Connected';
  const syncDot=!CloudSync.isConfigured()?'not-configured':syncStatus==='syncing'?'syncing':syncStatus==='error'?'error':'';
  const hasActiveFilters=filter||stageFilter||tagFilter||search;

  return(
    <div className="app-container">
      <div className="header">
        <h1>🏢 Self Storage Acquisition Tracker</h1>
        <div className="header-stats">
          <div className="stat" title="View all properties" onClick={()=>goFiltered(null)}>
            <div className="stat-value">{stats.total}</div><div className="stat-label">Total Properties</div>
          </div>
          <div className="stat" title="View active prospects" onClick={()=>goFiltered('active')}>
            <div className="stat-value">{stats.active}</div><div className="stat-label">Active Prospects</div>
          </div>
          <div className="stat" title="View deals made" onClick={()=>goFiltered('won')}>
            <div className="stat-value">{stats.won}</div><div className="stat-label">Deals Made</div>
          </div>
          <div className="stat" title="Total pipeline value (active prospects)">
            <div className="stat-value">{stats.pipelineValue>0?fmtM(stats.pipelineValue):'—'}</div><div className="stat-label">Pipeline Value</div>
          </div>
        </div>
      </div>
      {!CloudSync.isConfigured()&&(
        <div className="setup-banner">
          <h3>☁️ Cloud Sync Not Configured</h3>
          <p>Your data is currently saved locally only. Set up Google Sheets sync to access from any device!</p>
          <button className="btn btn-warning" onClick={()=>setShowSetup(true)}>Set Up Cloud Sync</button>
        </div>
      )}
      <div className="main-content">
        <div className="sidebar">
          <div className={`nav-item ${view==='dashboard'?'active':''}`} onClick={()=>{setView('dashboard');setSelected(null)}}>📊 Dashboard</div>
          <div className={`nav-item ${view==='contacts'?'active':''}`} onClick={()=>{setFilter(null);setView('contacts');setSelected(null)}}>👥 All Properties</div>
          <div className={`nav-item ${view==='pipeline'?'active':''}`} onClick={()=>{setView('pipeline');setSelected(null)}}>📈 Pipeline</div>
          <div className={`nav-item ${view==='tasks'?'active':''}`} onClick={()=>{setView('tasks');setSelected(null)}}>✅ Tasks</div>
          <div className={`nav-item ${view==='analytics'?'active':''}`} onClick={()=>{setView('analytics');setSelected(null)}}>📊 Analytics</div>
          <div style={{marginTop:'auto',paddingTop:'20px',borderTop:'1px solid #e9ecef'}}>
            <div className="nav-item" onClick={()=>setShowSettings(true)}>⚙️ CRM Settings</div>
            <div className="nav-item" onClick={()=>setShowSetup(true)}>☁️ Cloud Sync</div>
            <div className="mobile-hide-sync" style={{padding:'12px 16px',fontSize:'12px',color:'#6c757d',display:'flex',alignItems:'center',gap:'8px'}}>
              <div className={`sync-dot ${syncDot}`}></div><span>{syncLabel}</span>
            </div>
          </div>
        </div>
        <div className="content-area">
          {selected?(
            <ContactDetail contact={selected} onClose={()=>setSelected(null)} onUpdate={u=>updateContact(selected.id,u)}
              onDelete={()=>deleteContact(selected.id)} onAddComm={c=>addComm(selected.id,c)} followUpDays={followUpDays}/>
          ):view==='dashboard'?(
            <Dashboard contacts={contacts} onContactClick={setSelected} onAddContact={()=>setShowAdd(true)} followUpDays={followUpDays} onQuickLog={setQuickLogContact}/>
          ):view==='contacts'?(
            <ContactsList
              contacts={displayedContacts} search={search} onSearch={setSearch}
              onContactClick={setSelected} onAddContact={()=>setShowAdd(true)}
              filter={filter} onClearFilter={()=>setFilter(null)}
              sortBy={sortBy} onSort={setSortBy}
              stageFilter={stageFilter} onStageFilter={setStageFilter}
              tagFilter={tagFilter} onTagFilter={setTagFilter}
              allTags={allTags} hasActiveFilters={hasActiveFilters} onClearAll={clearAllFilters}
              onQuickLog={setQuickLogContact}/>
          ):view==='tasks'?(
            <TasksView contacts={contacts} onContactClick={setSelected} onUpdateContact={updateContact}/>
          ):view==='analytics'?(
            <AnalyticsView contacts={contacts}/>
          ):(
            <Pipeline contacts={contacts} onContactClick={setSelected}/>
          )}
        </div>
      </div>
      {showAdd&&<AddContactModal onClose={()=>setShowAdd(false)} onSave={addContact}/>}
      {showSetup&&<SetupModal onClose={()=>setShowSetup(false)} currentUrl={CloudSync.scriptUrl} onSave={url=>{CloudSync.configure(url);setSyncStatus('idle');setShowSetup(false);loadCloud()}}/>}
      {showSettings&&<SettingsModal onClose={()=>setShowSettings(false)} followUpDays={followUpDays} onSave={d=>{setFollowUpDays(d);localStorage.setItem('followUpDays',d.toString());setShowSettings(false)}}/>}
      {quickLogContact&&<QuickLogModal contact={quickLogContact} onClose={()=>setQuickLogContact(null)} onSave={comm=>{addComm(quickLogContact.id,comm);setQuickLogContact(null)}}/>}
    </div>
  );
}

    if(!url.trim()){setTestStatus('❌ Please enter a URL first');return}
    setTesting(true);setTestStatus('🔄 Testing...');
    try{const r=await fetch(url+'?action=test');const d=await r.json();setTestStatus(d.success?'✅ Connection successful!':'❌ Failed: '+(d.error||'Unknown'))}
    catch(e){setTestStatus('❌ Error: '+e.message)}

            <div style={{display:'flex',gap:'10px',marginBottom:'15px'}}>
              <button type="button" className="btn btn-secondary" onClick={test} disabled={testing} style={{flex:1}}>🧪 Test Connection</button>

            <button type="button" className="btn btn-secondary" onClick={onClose} style={{width:'100%',marginBottom:'10px'}}>Cancel</button>
            <button type="button" className="btn btn-warning" style={{width:'100%'}} onClick={()=>setShowInst(true)}>📖 Show Setup Instructions</button>

        ):(

            <h4 style={{marginBottom:'15px'}}>Setup Instructions</h4>

              <p><strong>Step 1:</strong> Create a new Google Sheet</p>
              <p><strong>Step 2:</strong> Click <strong>Extensions → Apps Script</strong></p>
              <p><strong>Step 3:</strong> Delete any code and paste the provided script</p>

              <p><strong>Step 5:</strong> Click <strong>Deploy → New deployment</strong></p>
              <p><strong>Step 6:</strong> Click gear icon ⚙️, select <strong>"Web app"</strong></p>
              <p><strong>Step 7:</strong> Set "Who has access" to <strong>"Anyone"</strong></p>
              <p><strong>Step 8:</strong> Click <strong>Deploy</strong> and authorize</p>
              <p><strong>Step 9:</strong> Copy the Web app URL</p>
              <p><strong>Step 10:</strong> Paste URL above and click Test Connection</p>
            </div>
            <button className="btn btn-secondary" style={{width:'100%',marginTop:'15px'}} onClick={()=>setShowInst(false)}>← Back</button>

/* ── daysInStage helper (used by multiple components) ── */
function daysInStage(contact){
  const since=contact.stageEnteredAt||contact.createdAt;
  if(!since)return null;
  return Math.floor((Date.now()-new Date(since))/86400000);
}
function DaysInStageBadge({contact}){
  const d=daysInStage(contact);
  if(d===null)return null;
  const cls=d<14?'fresh':d<45?'moderate':'stale';
  const icon=d<14?'🟢':d<45?'🟡':'🔴';
  return <span className={`days-badge ${cls}`}>{icon} {d}d in stage</span>;
}

/* ── Dashboard ── */

  const recent=[...contacts].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).slice(0,6);
  const needsFollowUp=contacts.filter(c=>{
    if(INACTIVE.includes(c.stage)&&!c.followUpOverride)return false;
    if(!c.communications||c.communications.length===0)return true;
    const last=c.communications[c.communications.length-1];
    return(Date.now()-new Date(last.date))/86400000>(c.customFollowUpDays||followUpDays);
  });
  const overdueTasks=[];
  contacts.forEach(c=>{(c.tasks||[]).forEach(t=>{if(!t.done&&t.dueDate&&new Date(t.dueDate+'T23:59:59')<new Date())overdueTasks.push({...t,contact:c})})});
  const pipelineValue=contacts.filter(c=>!INACTIVE.includes(c.stage)).reduce((s,c)=>s+(parseFloat(c.askingPrice)||parseFloat(c.estimatedValue)||0),0);
  const fmtM=v=>v>=1000000?`$${(v/1000000).toFixed(1)}M`:v>=1000?`$${(v/1000).toFixed(0)}K`:`$${v.toFixed(0)}`;

          ))}
          {overdueTasks.length>3&&<div style={{fontSize:12,color:'#6c757d',marginTop:4}}>+{overdueTasks.length-3} more — check Tasks view</div>}
        </div>
      )}
      <div style={{marginBottom:40}}>
        <h3 className="section-title">🔥 Needs Follow-Up ({needsFollowUp.length})</h3>
        {needsFollowUp.length>0?(
          <div className="contact-grid">{needsFollowUp.slice(0,6).map(c=><ContactCard key={c.id} contact={c} onClick={()=>onContactClick(c)} onQuickLog={onQuickLog}/>)}</div>
        ):(
          <div className="empty-state"><div className="empty-state-icon">✅</div><div>You're all caught up! Nice work.</div></div>

      )}

      {contacts.length>0?(
        <div className="contact-grid">{contacts.map(c=><ContactCard key={c.id} contact={c} onClick={()=>onContactClick(c)} onQuickLog={onQuickLog}/>)}</div>

        </div>
      ):(
        <div className="empty-state"><div className="empty-state-icon">👋</div><div>No properties found.</div></div>
      )}
    </div>
  );
}

/* ── ContactCard ── */
const STAGE_DISPLAY={new:'Not Contacted',contacted:'Initial Contact',followup:'Gathering Info',qualified:'Interested',won:'Deal Made',lost:'Not Interested',fellthrough:'Fell Through'};
function ContactCard({contact,onClick,onQuickLog}){
  const tags=contact.tags||[];
  const d=daysInStage(contact);
  const urgencyClass=INACTIVE.includes(contact.stage)?'':(d===null?'':d<14?'urgency-fresh':d<45?'urgency-moderate':'urgency-stale');
  const [swiped,setSwiped]=useState(false);
  const touchStartX=useRef(null);
  const rowRef=useRef(null);

  const onTouchStart=e=>{touchStartX.current=e.touches[0].clientX};
  const onTouchEnd=e=>{
    if(touchStartX.current===null)return;
    const dx=touchStartX.current-e.changedTouches[0].clientX;
    if(dx>50)setSwiped(true);
    else if(dx<-20)setSwiped(false);
    touchStartX.current=null;
  };

  const handleQuickLog=e=>{
    e.stopPropagation();
    setSwiped(false);
    if(onQuickLog)onQuickLog(contact);
    else onClick();
  };

  // sub-line: prefer address, fall back to owner name or email
  const subLine=contact.company||(contact.propertyName?contact.name:null)||contact.email||'';

  return(
    <div className={`contact-card ${urgencyClass}`} onClick={()=>{if(swiped){setSwiped(false)}else{onClick()}}}>

      <div

          <div className="mobile-row-meta">
            <span className={`stage-badge stage-${contact.stage}`} style={{fontSize:10,padding:'2px 7px'}}>{STAGE_DISPLAY[contact.stage]||contact.stage}</span>
            {d!==null&&<DaysInStageBadge contact={contact}/>}
            {openTask>0&&<span style={{fontSize:11,color:'#f57c00',fontWeight:600}}>📌 {openTask}</span>}
            {commCount>0&&<span style={{fontSize:11,color:'#6c757d'}}>📞 {commCount}</span>}

        <div style={{flex:1,minWidth:0}}>
          <div className="contact-name" style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{contact.propertyName||contact.name}</div>
          {contact.propertyName&&<div className="contact-company" style={{fontSize:'13px',marginTop:'4px'}}>👤 {contact.name}</div>}
          {contact.company&&<div className="contact-company">📍 {contact.company}</div>}
        </div>

/* ── TasksView ── */
function TasksView({contacts,onContactClick,onUpdateContact}){
  const now=Date.now();
  const allTasks=[];
  contacts.forEach(c=>{(c.tasks||[]).forEach(t=>{if(!t.done)allTasks.push({...t,contact:c})})});
  allTasks.sort((a,b)=>{
    if(!a.dueDate&&!b.dueDate)return 0;if(!a.dueDate)return 1;if(!b.dueDate)return -1;
    return new Date(a.dueDate)-new Date(b.dueDate);
  });
  const overdue=allTasks.filter(t=>t.dueDate&&new Date(t.dueDate+'T23:59:59')<new Date());
  const dueToday=allTasks.filter(t=>t.dueDate&&new Date(t.dueDate+'T23:59:59')>=new Date()&&new Date(t.dueDate+'T00:00:00')<=new Date());
  const upcoming=allTasks.filter(t=>!t.dueDate||(new Date(t.dueDate+'T00:00:00')>new Date()));
  const toggleTask=(contact,taskId)=>{
    onUpdateContact(contact.id,{tasks:(contact.tasks||[]).map(t=>t.id===taskId?{...t,done:!t.done}:t)});
  };
  const TaskRow=({t})=>{
    const diff=t.dueDate?Math.round((new Date(t.dueDate+'T12:00:00')-now)/86400000):null;
    const cls=t.done?'ok':diff===null?'ok':diff<0?'overdue':diff<3?'soon':'ok';
    const label=diff===null?null:diff<0?`${Math.abs(diff)}d overdue`:diff===0?'Today':diff===1?'Tomorrow':`In ${diff}d`;
    return(
      <div className={`task-item ${cls==='overdue'?'overdue':''}`} style={{cursor:'default'}}>
        <input type="checkbox" className="task-checkbox" checked={t.done} onChange={()=>toggleTask(t.contact,t.id)}/>
        <div className="task-content">
          <div className="task-title">{t.title}</div>
          {t.note&&<div style={{fontSize:12,color:'#6c757d'}}>{t.note}</div>}
          <div style={{fontSize:12,color:'#667eea',marginTop:3,cursor:'pointer',fontWeight:600}} onClick={()=>onContactClick(t.contact)}>→ {t.contact.propertyName||t.contact.name}</div>
        </div>
        {label&&<span className={`task-due ${cls}`} style={{fontSize:12,flexShrink:0}}>{label}</span>}
      </div>
    );
  };
  return(
    <div>
      <h2 style={{fontSize:24,fontWeight:700,marginBottom:24}}>✅ Tasks & Next Steps</h2>
      {allTasks.length===0&&<div className="empty-state"><div className="empty-state-icon">✅</div><div>No open tasks. Open a property to add tasks.</div></div>}
      {overdue.length>0&&(<div style={{marginBottom:28}}><h3 className="section-title" style={{color:'#c62828'}}>🚨 Overdue ({overdue.length})</h3><div className="task-list">{overdue.map(t=><TaskRow key={t.id+t.contact.id} t={t}/>)}</div></div>)}
      {dueToday.length>0&&(<div style={{marginBottom:28}}><h3 className="section-title" style={{color:'#f57c00'}}>📅 Due Today ({dueToday.length})</h3><div className="task-list">{dueToday.map(t=><TaskRow key={t.id+t.contact.id} t={t}/>)}</div></div>)}
      {upcoming.length>0&&(<div style={{marginBottom:28}}><h3 className="section-title">📋 Upcoming ({upcoming.length})</h3><div className="task-list">{upcoming.map(t=><TaskRow key={t.id+t.contact.id} t={t}/>)}</div></div>)}
    </div>
  );
}

/* ── AnalyticsView ── */
function AnalyticsView({contacts}){
  const canvasRef=useRef(null);
  const STAGE_CONFIG={
    new:{label:'Not Contacted',color:'#5c85d6'},contacted:{label:'Initial Contact',color:'#a855f7'},
    followup:{label:'Gathering Info',color:'#f97316'},qualified:{label:'Interested',color:'#22c55e'},
    won:{label:'Deal Made',color:'#16a34a'},lost:{label:'Not Interested',color:'#ef4444'},
    fellthrough:{label:'Fell Through',color:'#fb923c'}
  };
  const ACTIVE_STAGES=['new','contacted','followup','qualified'];
  const now=new Date();
  const months=[];
  for(let i=7;i>=0;i--){const d=new Date(now.getFullYear(),now.getMonth()-i,1);months.push({label:d.toLocaleString('default',{month:'short',year:'2-digit'}),year:d.getFullYear(),month:d.getMonth()})}
  const monthlyData=months.map(m=>{
    const count=contacts.filter(c=>{const d=new Date(c.createdAt);return d.getFullYear()===m.year&&d.getMonth()===m.month}).length;
    const wonCount=contacts.filter(c=>{if(c.stage!=='won')return false;const hist=[...(c.stageHistory||[])];const wonEntry=hist.find(h=>h.stage==='won')||null;const d=new Date(wonEntry?wonEntry.enteredAt:c.createdAt);return d.getFullYear()===m.year&&d.getMonth()===m.month}).length;
    return{...m,count,wonCount};
  });
  useEffect(()=>{
    const canvas=canvasRef.current;if(!canvas)return;
    const ctx=canvas.getContext('2d');const W=canvas.offsetWidth||600;const H=180;
    canvas.width=W*window.devicePixelRatio;canvas.height=H*window.devicePixelRatio;
    canvas.style.width=W+'px';canvas.style.height=H+'px';ctx.scale(window.devicePixelRatio,window.devicePixelRatio);
    ctx.clearRect(0,0,W,H);
    const pad={l:32,r:16,t:16,b:28};const chartW=W-pad.l-pad.r;const chartH=H-pad.t-pad.b;
    const maxVal=Math.max(...monthlyData.map(m=>m.count),1);const barGroupW=chartW/monthlyData.length;const barW=Math.min(barGroupW*0.35,22);const gap=4;
    ctx.strokeStyle='#e9ecef';ctx.lineWidth=1;
    for(let i=0;i<=4;i++){const y=pad.t+chartH-(chartH/4)*i;ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();ctx.fillStyle='#adb5bd';ctx.font='10px system-ui';ctx.textAlign='right';ctx.fillText(Math.round(maxVal/4*i),pad.l-4,y+3)}
    monthlyData.forEach((m,i)=>{
      const x=pad.l+barGroupW*i+barGroupW/2;const h1=(m.count/maxVal)*chartH;const x1=x-barW-gap/2;
      ctx.fillStyle='#667eea';ctx.beginPath();ctx.roundRect(x1,pad.t+chartH-h1,barW,h1,3);ctx.fill();
      if(m.wonCount>0){const h2=(m.wonCount/maxVal)*chartH;const x2=x+gap/2;ctx.fillStyle='#28a745';ctx.beginPath();ctx.roundRect(x2,pad.t+chartH-h2,barW,h2,3);ctx.fill()}
      ctx.fillStyle='#6c757d';ctx.font='10px system-ui';ctx.textAlign='center';ctx.fillText(m.label,x,H-6);
      if(m.count>0){ctx.fillStyle='#495057';ctx.font='bold 10px system-ui';ctx.fillText(m.count,x1+barW/2,pad.t+chartH-h1-4)}
      if(m.wonCount>0){ctx.fillStyle='#2e7d32';ctx.font='bold 10px system-ui';ctx.fillText(m.wonCount,x+gap/2+barW/2,pad.t+chartH-(m.wonCount/maxVal)*chartH-4)}
    });
  },[contacts]);
  const total=contacts.length||1;const funnelStages=['new','contacted','followup','qualified','won'];
  const avgDaysPerStage={};
  ACTIVE_STAGES.forEach(s=>{
    const durations=[];
    contacts.forEach(c=>{
      (c.stageHistory||[]).forEach(h=>{if(h.stage===s&&h.enteredAt&&h.exitedAt)durations.push((new Date(h.exitedAt)-new Date(h.enteredAt))/86400000)});
      if(c.stage===s&&c.stageEnteredAt)durations.push((Date.now()-new Date(c.stageEnteredAt))/86400000);
    });
    avgDaysPerStage[s]=durations.length?Math.round(durations.reduce((a,b)=>a+b,0)/durations.length):null;
  });
  const staleContacts=contacts.filter(c=>!INACTIVE.includes(c.stage)&&daysInStage(c)>=45);
  const conversionRate=contacts.length>0?Math.round((contacts.filter(c=>c.stage==='won').length/contacts.length)*100):0;
  return(
    <div>
      <h2 style={{fontSize:24,fontWeight:700,marginBottom:24}}>📊 Analytics & Trends</h2>
      <div className="chart-container">
        <div className="chart-title">Monthly Activity</div>
        <div className="chart-subtitle">Properties added vs. deals closed per month</div>
        <div className="chart-wrap"><canvas ref={canvasRef} style={{width:'100%',display:'block'}}/></div>
        <div className="chart-legend">
          <div className="legend-item"><div className="legend-dot" style={{background:'#667eea'}}></div>Added to pipeline</div>
          <div className="legend-item"><div className="legend-dot" style={{background:'#28a745'}}></div>Deals closed (Won)</div>
        </div>
      </div>
      <div className="chart-container">
        <div className="chart-title">Pipeline Funnel</div>
        <div className="chart-subtitle">Current distribution across all stages</div>
        {funnelStages.map(s=>{const c=contacts.filter(x=>x.stage===s).length;const pct=Math.round((c/total)*100);const cfg=STAGE_CONFIG[s];return(
          <div key={s} className="funnel-row">
            <div className="funnel-label">{cfg.label}</div>
            <div className="funnel-bar-wrap"><div className="funnel-bar" style={{width:pct+'%',background:cfg.color,minWidth:c>0?'32px':'0'}}>{c>0&&<span className="funnel-count">{c}</span>}</div></div>
            <div style={{width:36,textAlign:'right',fontSize:12,color:'#6c757d'}}>{pct}%</div>
          </div>
        )})}
      </div>
      <div className="analytics-grid">
        <div className="analytics-card">
          <div className="analytics-card-title">⏱ Avg Days Per Stage</div>
          {ACTIVE_STAGES.map(s=>{const cfg=STAGE_CONFIG[s];const avg=avgDaysPerStage[s];return(
            <div key={s} className="stat-row"><span className="stat-row-label" style={{color:cfg.color,fontWeight:600}}>{cfg.label}</span><span className="stat-row-value">{avg!==null?avg+'d':'—'}</span></div>
          )})}
          <div style={{marginTop:12,fontSize:11,color:'#adb5bd'}}>Based on current & historical stage data</div>
        </div>
        <div className="analytics-card">
          <div className="analytics-card-title">🎯 Pipeline Health</div>
          <div className="stat-row"><span className="stat-row-label">Total Properties</span><span className="stat-row-value">{contacts.length}</span></div>
          <div className="stat-row"><span className="stat-row-label">Active Prospects</span><span className="stat-row-value">{contacts.filter(c=>!INACTIVE.includes(c.stage)).length}</span></div>
          <div className="stat-row"><span className="stat-row-label">Deals Won</span><span className="stat-row-value" style={{color:'#28a745'}}>{contacts.filter(c=>c.stage==='won').length}</span></div>
          <div className="stat-row"><span className="stat-row-label">Win Rate</span><span className="stat-row-value" style={{color:conversionRate>10?'#28a745':'#f57c00'}}>{conversionRate}%</span></div>
          <div className="stat-row"><span className="stat-row-label">🔴 Stale (&gt;45d in stage)</span><span className="stat-row-value" style={{color:staleContacts.length>0?'#c62828':'#28a745'}}>{staleContacts.length}</span></div>
        </div>
      </div>
      {staleContacts.length>0&&(
        <div className="chart-container" style={{marginBottom:0}}>
          <div className="chart-title">🔴 Stale Properties (45+ days in current stage)</div>
          <div className="chart-subtitle">These may need attention or a status update</div>
          {staleContacts.sort((a,b)=>daysInStage(b)-daysInStage(a)).map(c=>(
            <div key={c.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:'1px solid #e9ecef'}}>
              <div><div style={{fontWeight:600,fontSize:14}}>{c.propertyName||c.name}</div><div style={{fontSize:12,color:'#6c757d'}}>{STAGE_CONFIG[c.stage]?.label||c.stage}</div></div>
              <span className="days-badge stale">🔴 {daysInStage(c)}d</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

        </div>
      </div>
      <div className="info-grid">
        <div className="info-item"><div className="info-label">Email</div><div className="info-value">📧 {contact.email||'Not provided'}</div></div>
        <div className="info-item"><div className="info-label">Phone</div><div className="info-value">📱 {contact.phone||'Not provided'}</div></div>
        <div className="info-item"><div className="info-label">Property Name</div><div className="info-value">🏢 {contact.propertyName||'Not provided'}</div></div>
        <div className="info-item"><div className="info-label">Property Address</div><div className="info-value">📍 {contact.company||'Not provided'}</div></div>
        <div className="info-item">
          <div className="info-label">Property Website</div>
          <div className="info-value">{contact.website?<a href={contact.website} target="_blank" rel="noopener noreferrer" style={{color:'#667eea',textDecoration:'none'}}>🌐 {contact.website}</a>:'🌐 Not provided'}</div>
        </div>
        <div className="info-item">
          <div className="info-label">Follow-Up Reminder</div>
          {isInactive?(
            <div className="followup-override-box">
              <label className="toggle-row">
                <span className="toggle-switch">
                  <input type="checkbox" checked={!!contact.followUpOverride}
                    onChange={e=>onUpdate({followUpOverride:e.target.checked,customFollowUpDays:e.target.checked?(contact.customFollowUpDays||followUpDays):undefined})}/>
                  <span className="toggle-slider"></span>
                </span>
                <span className="toggle-label">{contact.followUpOverride?'🔔 Reminders enabled':'🔕 Reminders off'}</span>
              </label>
              {contact.followUpOverride&&(
                <div className="override-days-row">
                  <input type="number" className="form-input" value={contact.customFollowUpDays||followUpDays}
                    onChange={e=>onUpdate({customFollowUpDays:parseInt(e.target.value)})} min="1" max="365" style={{width:'80px'}}/>
                  <span style={{fontSize:'14px',color:'#6c757d'}}>days between reminders</span>
                </div>
              )}
              <div style={{marginTop:8,fontSize:12,color:'#856404'}}>Status ({contact.stage}) normally skips follow-up reminders. Toggle to override for this property.</div>
            </div>
          ):(
            <div style={{marginTop:8}}>
              <input type="number" className="form-input" value={contact.customFollowUpDays||followUpDays}
                onChange={e=>onUpdate({customFollowUpDays:parseInt(e.target.value)})} min="1" max="365" style={{width:'80px',display:'inline-block',marginRight:'8px'}}/>
              <span style={{fontSize:'14px',color:'#6c757d'}}>days</span>
            </div>
          )}
        </div>
        <div className="info-item">
          <div className="info-label">Status</div>
          <select value={contact.stage} onChange={e=>onUpdate({stage:e.target.value})} className="form-select" style={{marginTop:8}}>
            <option value="new">Not Contacted</option>
            <option value="contacted">Initial Contact</option>
            <option value="followup">Gathering Info</option>
            <option value="qualified">Interested in Selling</option>
            <option value="won">Deal Made</option>
            <option value="lost">Not Interested</option>
            <option value="fellthrough">Deal Fell Through</option>
          </select>
          <div style={{marginTop:8}}><DaysInStageBadge contact={contact}/></div>
        </div>
        <div className="info-item">
          <div className="info-label">Tags</div>
          <div style={{marginTop:8}}>
            <TagInput tags={tags} onChange={newTags=>onUpdate({tags:newTags})}/>
            <small style={{color:'#6c757d',fontSize:12,marginTop:5,display:'block'}}>Press Enter or comma to add · Backspace to remove last</small>
          </div>
        </div>
      </div>
      {contact.notes&&(
        <div style={{marginBottom:30}}>
          <h3 className="section-title">📝 Property Details / Notes</h3>
          <div style={{background:'#f8f9fa',padding:16,borderRadius:8}}>{contact.notes}</div>
        </div>
      )}
      {(contact.askingPrice||contact.estimatedValue||contact.unitCount||contact.occupancyRate||contact.squareFootage)&&(
        <div style={{marginBottom:30}}>
          {(contact.askingPrice||contact.estimatedValue)&&(
            <div>
              <h3 className="section-title" style={{marginBottom:12}}>💰 Financial</h3>
              <div className="financial-grid">
                <div className="financial-item"><div className="financial-label">Asking Price</div><div className="financial-value">{fmt$(contact.askingPrice)}</div></div>
                <div className="financial-item"><div className="financial-label">Estimated Value</div><div className="financial-value">{fmt$(contact.estimatedValue)}</div></div>
                {(()=>{const ap=parseFloat(contact.askingPrice),ev=parseFloat(contact.estimatedValue);return(isFinite(ap)&&ap>0&&isFinite(ev)&&ev>0)?<div className="financial-item"><div className="financial-label">Difference</div><div className="financial-value" style={{color:ev>=ap?'#388e3c':'#c62828'}}>{fmt$(Math.abs(ev-ap))}</div></div>:null})()}
              </div>
            </div>
          )}
          {(contact.unitCount||contact.occupancyRate||contact.squareFootage)&&(
            <div>
              <h3 className="section-title" style={{marginBottom:12,marginTop:contact.askingPrice||contact.estimatedValue?16:0}}>🏗️ Property Metrics</h3>
              <div className="metrics-grid">
                <div className="metric-item"><div className="metric-label">Unit Count</div><div className="metric-value">{fmtNum(contact.unitCount)}</div></div>
                <div className="metric-item"><div className="metric-label">Occupancy Rate</div><div className="metric-value">{fmtPct(contact.occupancyRate)}</div></div>
                <div className="metric-item"><div className="metric-label">Square Footage</div><div className="metric-value">{fmtNum(contact.squareFootage)} {contact.squareFootage?'sqft':''}</div></div>
              </div>
            </div>
          )}
        </div>
      )}
      <div style={{marginBottom:30}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <h3 className="section-title" style={{marginBottom:0}}>✅ Tasks & Next Steps ({pendingTasks.length} open)</h3>
          <button className="btn btn-primary btn-sm" onClick={()=>setShowAddTask(true)}>+ Add Task</button>
        </div>
        {showAddTask&&(
          <div style={{background:'#f0f4ff',border:'1.5px solid #667eea',borderRadius:8,padding:16,marginBottom:16}}>
            <div className="form-group"><label className="form-label">Task *</label><input type="text" className="form-input" value={taskTitle} onChange={e=>setTaskTitle(e.target.value)} placeholder="e.g. Call back on Friday, Send LOI"/></div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
              <div className="form-group" style={{marginBottom:0}}><label className="form-label">Due Date</label><input type="date" className="form-input" value={taskDue} onChange={e=>setTaskDue(e.target.value)}/></div>
              <div className="form-group" style={{marginBottom:0}}><label className="form-label">Note (optional)</label><input type="text" className="form-input" value={taskNote} onChange={e=>setTaskNote(e.target.value)} placeholder="Extra context..."/></div>
            </div>
            <div style={{display:'flex',gap:8,marginTop:12,justifyContent:'flex-end'}}>
              <button className="btn btn-secondary btn-sm" onClick={()=>{setShowAddTask(false);setTaskTitle('');setTaskDue('');setTaskNote('')}}>Cancel</button>
              <button className="btn btn-success btn-sm" onClick={addTask}>✅ Save Task</button>
            </div>
          </div>
        )}
        {pendingTasks.length>0?(
          <div className="task-list">
            {pendingTasks.map(t=>(
              <div key={t.id} className={`task-item ${taskDueClass(t)==='overdue'?'overdue':''}`}>
                <input type="checkbox" className="task-checkbox" checked={t.done} onChange={()=>toggleTask(t.id)}/>
                <div className="task-content">
                  <div className="task-title">{t.title}</div>
                  {t.note&&<div style={{fontSize:13,color:'#6c757d',marginBottom:4}}>{t.note}</div>}
                  <div className="task-meta">{t.dueDate&&<span className={`task-due ${taskDueClass(t)}`}>📅 {taskDueLabel(t)} ({new Date(t.dueDate+'T12:00:00').toLocaleDateString()})</span>}</div>
                </div>
                <button className="btn btn-danger btn-sm" style={{padding:'2px 8px',fontSize:12,flexShrink:0}} onClick={()=>deleteTask(t.id)}>🗑️</button>
              </div>
            ))}
          </div>
        ):(
          <div className="empty-state" style={{padding:'20px 0'}}><div className="empty-state-icon" style={{fontSize:28}}>✅</div><div style={{fontSize:14}}>No open tasks</div></div>
        )}
        {doneTasks.length>0&&(
          <details style={{marginTop:12}}>
            <summary style={{cursor:'pointer',fontSize:13,color:'#6c757d',padding:'4px 0'}}>Show {doneTasks.length} completed task{doneTasks.length!==1?'s':''}</summary>
            <div className="task-list" style={{marginTop:8}}>
              {doneTasks.map(t=>(
                <div key={t.id} className="task-item done">
                  <input type="checkbox" className="task-checkbox" checked={t.done} onChange={()=>toggleTask(t.id)}/>
                  <div className="task-content"><div className="task-title">{t.title}</div></div>
                  <button className="btn btn-danger btn-sm" style={{padding:'2px 8px',fontSize:12,flexShrink:0}} onClick={()=>deleteTask(t.id)}>🗑️</button>
                </div>
              ))}
            </div>
          </details>
        )}
      </div>
      <div style={{marginBottom:30}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <h3 className="section-title" style={{marginBottom:0}}>📞 Contact History ({contact.communications?.length||0})</h3>
          <button className="btn btn-primary btn-sm" onClick={()=>setShowComm(true)}>+ Log Contact</button>
        </div>
        {contact.communications&&contact.communications.length>0?(
          <div className="communication-list">
            {[...contact.communications].reverse().map(comm=>(
              <div key={comm.id} className="communication-item">
                <div className="comm-header">
                  <div className="comm-type">{comm.type==='email'?'📧 Email':comm.type==='call'?'📞 Phone Call':comm.type==='social'?'📱 Social Media':comm.type==='mail'?'📬 Mail':'💬 Text Message'}</div>
                  <div style={{display:'flex',gap:8,alignItems:'center'}}>
                    <div className="comm-date">{new Date(comm.date).toLocaleString()}</div>
                    <button className="btn btn-sm" style={{padding:'2px 8px',fontSize:12}} onClick={()=>startEdit(comm)}>✏️</button>
                    <button className="btn btn-danger btn-sm" style={{padding:'2px 8px',fontSize:12}} onClick={()=>{if(confirm('Delete this entry?'))onUpdate({communications:contact.communications.filter(c=>c.id!==comm.id)})}}>🗑️</button>
                  </div>
                </div>
                <div className="comm-message">{comm.message}</div>
              </div>
            ))}
          </div>
        ):(
          <div className="empty-state"><div className="empty-state-icon">📞</div><div>No contacts logged yet</div></div>
        )}
      </div>
      <div className="action-buttons">
        <button className="btn btn-danger" onClick={onDelete}>🗑️ Delete Property Owner</button>
      </div>
      {showComm&&(
        <div className="modal" onClick={closeComm}>
          <div className="modal-content" onClick={e=>e.stopPropagation()}>
            <div className="modal-header"><h3 className="modal-title">{editComm?'Edit Contact':'Log Contact'}</h3><button className="close-btn" onClick={closeComm}>×</button></div>
            <div className="form-group"><label className="form-label">Contact Type</label>
              <select className="form-select" value={commType} onChange={e=>setCommType(e.target.value)}>
                <option value="call">📞 Phone Call</option><option value="email">📧 Email</option>
                <option value="text">💬 Text Message</option><option value="social">📱 Social Media</option>
                <option value="mail">📬 Mail</option>
              </select>
            </div>
            <div className="form-group"><label className="form-label">Date & Time</label>
              <input type="datetime-local" className="form-input" value={commDate} onChange={e=>setCommDate(e.target.value)}/>
              <small style={{color:'#6c757d',fontSize:12,marginTop:4,display:'block'}}>Leave blank to use current date/time</small>
            </div>
            <div className="form-group"><label className="form-label">Notes</label>
              <textarea className="form-textarea" value={commMsg} onChange={e=>setCommMsg(e.target.value)} placeholder="What did you discuss? Any next steps?"/>
            </div>
            <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
              <button className="btn btn-secondary" onClick={closeComm}>Cancel</button>
              <button className="btn btn-success" onClick={doAddComm}>✅ {editComm?'Update':'Save Contact'}</button>
            </div>
            <div className="tip-box">💡 <strong>Pro tip:</strong> Track unit count, occupancy rate, asking price, motivation to sell, timeline, etc.</div>
          </div>
        </div>
      )}
      {showEdit&&<EditContactModal contact={contact} onClose={()=>setShowEdit(false)} onSave={u=>{onUpdate(u);setShowEdit(false)}}/>}
    </div>
  );
}

/* ── QuickLogModal — mobile bottom-sheet for fast contact logging ── */
function QuickLogModal({contact,onClose,onSave}){
  const[commType,setCommType]=useState('call');
  const[commMsg,setCommMsg]=useState('');
  const typeOptions=[
    {value:'call',label:'📞 Call'},
    {value:'text',label:'💬 Text'},
    {value:'email',label:'📧 Email'},
    {value:'social',label:'📱 Social'},
    {value:'mail',label:'📬 Mail'},
  ];
  const handleSave=()=>{
    if(!commMsg.trim())return;
    onSave({type:commType,message:commMsg,date:new Date().toISOString()});
  };
  return(
    <div style={{position:'fixed',inset:0,zIndex:2000,display:'flex',flexDirection:'column',justifyContent:'flex-end'}}
      onClick={onClose}>
      {/* dim overlay */}
      <div style={{position:'absolute',inset:0,background:'rgba(0,0,0,.45)'}}/>
      {/* sheet */}
      <div style={{position:'relative',background:'white',borderRadius:'20px 20px 0 0',padding:'20px 20px 36px',boxShadow:'0 -4px 30px rgba(0,0,0,.2)',maxHeight:'80vh',overflowY:'auto'}}
        onClick={e=>e.stopPropagation()}>
        {/* drag handle */}
        <div style={{width:40,height:4,borderRadius:2,background:'#dee2e6',margin:'0 auto 16px'}}/>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <div>
            <div style={{fontSize:17,fontWeight:700,color:'#212529'}}>{contact.propertyName||contact.name}</div>
            {contact.company&&<div style={{fontSize:13,color:'#6c757d',marginTop:2}}>📍 {contact.company}</div>}
          </div>
          <button onClick={onClose} style={{background:'none',border:'none',fontSize:24,color:'#6c757d',cursor:'pointer',padding:4}}>×</button>
        </div>
        {/* type picker */}
        <div style={{display:'flex',gap:8,marginBottom:16,overflowX:'auto',paddingBottom:4}}>
          {typeOptions.map(o=>(
            <button key={o.value} onClick={()=>setCommType(o.value)}
              style={{padding:'8px 14px',borderRadius:20,border:'2px solid',borderColor:commType===o.value?'#667eea':'#e9ecef',
                background:commType===o.value?'#667eea':'white',color:commType===o.value?'white':'#495057',
                fontWeight:600,fontSize:13,whiteSpace:'nowrap',cursor:'pointer',transition:'all .15s',flexShrink:0}}>
              {o.label}
            </button>
          ))}
        </div>
        {/* notes */}
        <textarea
          style={{width:'100%',padding:'12px',border:'2px solid #e9ecef',borderRadius:10,fontSize:15,fontFamily:'inherit',
            resize:'none',minHeight:100,outline:'none',lineHeight:1.5,boxSizing:'border-box'}}
          placeholder="What did you discuss? Any next steps?"
          value={commMsg}
          onChange={e=>setCommMsg(e.target.value)}
          onFocus={e=>{e.target.style.borderColor='#667eea'}}
          onBlur={e=>{e.target.style.borderColor='#e9ecef'}}
          autoFocus
        />
        <button onClick={handleSave}
          style={{width:'100%',marginTop:12,padding:'14px',background:commMsg.trim()?'#667eea':'#adb5bd',
            color:'white',border:'none',borderRadius:10,fontSize:16,fontWeight:700,cursor:commMsg.trim()?'pointer':'default',transition:'background .2s'}}>
          ✅ Save Contact Log
        </button>
      </div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
