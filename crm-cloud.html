<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Self Storage Acquisition Tracker</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
.app-container{max-width:1400px;margin:0 auto;background:white;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.3);overflow:hidden}
.header{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;padding:30px;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:28px;font-weight:700}
.header-stats{display:flex;gap:30px}
.stat{text-align:center;cursor:pointer;padding:8px 12px;border-radius:10px;transition:background .18s,transform .15s;border:2px solid transparent}
.stat:hover{background:rgba(255,255,255,.18);transform:translateY(-2px);border-color:rgba(255,255,255,.4)}
.stat:active{transform:translateY(0)}
.stat-value{font-size:24px;font-weight:700}
.stat-label{font-size:12px;opacity:.9;text-transform:uppercase;letter-spacing:.5px}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#28a745}
.sync-dot.syncing{background:#ffc107;animation:pulse 1s infinite}
.sync-dot.error{background:#dc3545}
.sync-dot.not-configured{background:#6c757d}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.main-content{display:flex}
.sidebar{width:250px;background:#f8f9fa;border-right:1px solid #e9ecef;padding:20px;min-height:600px;display:flex;flex-direction:column}
.nav-item{padding:12px 16px;margin-bottom:8px;border-radius:8px;cursor:pointer;transition:all .2s;font-weight:500;color:#495057}
.nav-item:hover{background:#e9ecef}
.nav-item.active{background:#667eea;color:white}
.content-area{flex:1;padding:30px;overflow-y:auto;max-height:calc(100vh - 140px)}
.btn{padding:10px 20px;border:none;border-radius:8px;cursor:pointer;font-weight:600;transition:all .2s;display:inline-flex;align-items:center;gap:8px}
.btn-primary{background:#667eea;color:white}
.btn-primary:hover{background:#5568d3;transform:translateY(-1px)}
.btn-secondary{background:#e9ecef;color:#495057}
.btn-secondary:hover{background:#dee2e6}
.btn-success{background:#28a745;color:white}
.btn-success:hover{background:#218838}
.btn-danger{background:#dc3545;color:white}
.btn-warning{background:#ffc107;color:#212529}
.btn-sm{padding:6px 12px;font-size:14px}
.search-bar{width:100%;padding:12px 16px;border:2px solid #e9ecef;border-radius:8px;font-size:14px;margin-bottom:20px}
.search-bar:focus{outline:none;border-color:#667eea}
.contact-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;margin-top:20px}
.contact-card{background:white;border:1px solid #e9ecef;border-radius:12px;padding:20px;transition:all .2s;cursor:pointer}
.contact-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.1);transform:translateY(-2px)}
.contact-header{display:flex;justify-content:space-between;align-items:start;margin-bottom:12px}
.contact-name{font-size:18px;font-weight:600;color:#212529}
.contact-company{font-size:14px;color:#6c757d;margin-bottom:8px}
.contact-info{font-size:13px;color:#6c757d;margin-bottom:4px}
.stage-badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.stage-new{background:#e3f2fd;color:#1976d2}
.stage-contacted{background:#f3e5f5;color:#7b1fa2}
.stage-followup{background:#fff3e0;color:#f57c00}
.stage-qualified{background:#e8f5e9;color:#388e3c}
.stage-won{background:#c8e6c9;color:#2e7d32}
.stage-lost{background:#ffebee;color:#c62828}
.stage-fellthrough{background:#fff3e0;color:#ff6f00}
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal-content{background:white;border-radius:12px;padding:30px;max-width:600px;width:100%;max-height:90vh;overflow-y:auto}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-title{font-size:24px;font-weight:700}
.close-btn{background:none;border:none;cursor:pointer;padding:4px;color:#6c757d;font-size:24px}
.form-group{margin-bottom:20px}
.form-label{display:block;margin-bottom:8px;font-weight:600;color:#212529}
.form-input,.form-select,.form-textarea{width:100%;padding:10px 12px;border:2px solid #e9ecef;border-radius:8px;font-size:14px;font-family:inherit}
.form-input:focus,.form-select:focus,.form-textarea:focus{outline:none;border-color:#667eea}
.form-textarea{resize:vertical;min-height:100px}
.detail-header{display:flex;justify-content:space-between;align-items:start;margin-bottom:30px;padding-bottom:20px;border-bottom:2px solid #e9ecef}
.detail-title{font-size:28px;font-weight:700;margin-bottom:8px}
.detail-subtitle{font-size:16px;color:#6c757d}
.info-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;margin-bottom:30px}
.info-item{padding:16px;background:#f8f9fa;border-radius:8px}
.info-label{font-weight:600;color:#495057;margin-bottom:4px;font-size:12px;text-transform:uppercase;letter-spacing:.5px}
.info-value{color:#212529;font-size:16px}
.section-title{font-size:20px;font-weight:700;margin-bottom:16px;color:#212529}
.communication-list{display:flex;flex-direction:column;gap:16px}
.communication-item{background:#f8f9fa;padding:16px;border-radius:8px;border-left:4px solid #667eea}
.comm-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.comm-type{font-weight:600;color:#212529}
.comm-date{font-size:13px;color:#6c757d}
.comm-message{color:#495057;line-height:1.5}
.action-buttons{display:flex;gap:10px;margin-top:20px}
.empty-state{text-align:center;padding:60px 20px;color:#6c757d}
.empty-state-icon{font-size:48px;margin-bottom:16px;opacity:.5}
.pipeline-board{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}
.pipeline-column{background:#f8f9fa;border-radius:12px;padding:16px;display:flex;flex-direction:column}
.pipeline-header{font-weight:700;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.pipeline-count{background:white;padding:2px 8px;border-radius:12px;font-size:12px}
.pipeline-cards{display:flex;flex-direction:column;gap:12px;overflow-y:auto;max-height:380px;padding-right:4px}
.pipeline-cards::-webkit-scrollbar{width:6px}
.pipeline-cards::-webkit-scrollbar-track{background:#e9ecef;border-radius:3px}
.pipeline-cards::-webkit-scrollbar-thumb{background:#adb5bd;border-radius:3px}
.pipeline-cards::-webkit-scrollbar-thumb:hover{background:#667eea}
.pipeline-card{background:white;padding:12px;border-radius:8px;cursor:pointer;transition:all .2s;border:2px solid transparent;flex-shrink:0}
.pipeline-card:hover{border-color:#667eea;transform:scale(1.02)}
.pipeline-card-name{font-weight:600;margin-bottom:4px}
.pipeline-card-company{font-size:13px;color:#6c757d}
.tip-box{margin-top:20px;padding:16px;background:#fff3cd;border-radius:8px;font-size:14px}
.setup-banner{background:#fff3cd;border:2px solid #ffc107;border-radius:8px;padding:20px;margin:20px}
.setup-banner h3{margin-bottom:10px;color:#856404}
.setup-banner p{margin-bottom:10px;color:#856404}
.followup-override-box{background:#fff8e1;border:1.5px solid #ffc107;border-radius:8px;padding:14px;margin-top:6px}
.toggle-row{display:flex;align-items:center;gap:10px;cursor:pointer}
.toggle-switch{position:relative;width:42px;height:24px;flex-shrink:0}
.toggle-switch input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#ccc;border-radius:24px;transition:.3s}
.toggle-slider:before{position:absolute;content:"";height:18px;width:18px;left:3px;bottom:3px;background:white;border-radius:50%;transition:.3s}
.toggle-switch input:checked+.toggle-slider{background:#667eea}
.toggle-switch input:checked+.toggle-slider:before{transform:translateX(18px)}
.toggle-label{font-size:14px;font-weight:600;color:#5f4a00;user-select:none}
.override-days-row{display:flex;align-items:center;gap:8px;margin-top:10px}
.filter-banner{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding:10px 14px;background:#e8eeff;border-radius:8px;font-size:14px}
@media(max-width:768px){
body{padding:0}
.app-container{border-radius:0;min-height:100vh}
.header{flex-direction:column;gap:20px;padding:20px}
.header h1{font-size:22px}
.header-stats{width:100%;justify-content:space-around}
.main-content{flex-direction:column}
.sidebar{width:100%;display:flex;flex-direction:row;overflow-x:auto;padding:10px;border-right:none;border-bottom:1px solid #e9ecef;min-height:auto;align-items:center}
.sidebar>div:last-child{display:flex!important;flex-direction:row;align-items:center;margin-top:0;padding-top:0;border-top:none;border-left:1px solid #e9ecef;padding-left:8px;margin-left:4px}
.mobile-hide-sync{display:none!important}
.nav-item{white-space:nowrap;margin-right:8px;margin-bottom:0}
.content-area{padding:15px;max-height:none}
.contact-grid{grid-template-columns:1fr}
.info-grid{grid-template-columns:1fr}
.pipeline-board{grid-template-columns:1fr}
.pipeline-cards{max-height:none;overflow-y:visible}
.detail-header{flex-direction:column;gap:15px}
.modal{padding:10px}
.modal-content{padding:20px}
}
.hidden{display:none!important}
</style>
</head>
<body>
<div id="root"><div style="display:flex;justify-content:center;align-items:center;min-height:100vh;flex-direction:column;color:white;text-align:center;padding:20px"><h2 style="margin-bottom:20px">Loading CRM...</h2><p>If this message persists, please refresh the page.</p></div></div>
<script type="text/babel">
const{useState,useEffect}=React;
const INACTIVE=['won','lost','fellthrough'];
const CloudSync={
scriptUrl:localStorage.getItem('sheetsScriptUrl')||'',
isConfigured(){return this.scriptUrl!==''},
configure(url){this.scriptUrl=url;localStorage.setItem('sheetsScriptUrl',url)},
async sync(data){
if(!this.isConfigured())return{success:false,error:'Not configured'};
try{const fd=new FormData();fd.append('data',JSON.stringify({action:'save',data}));await fetch(this.scriptUrl,{method:'POST',body:fd});return{success:true}}
catch(e){if(e.message.includes('CORS')||e.message.includes('Failed to fetch'))return{success:true};return{success:false,error:e.message}}
},
async load(){
if(!this.isConfigured())return{success:false,error:'Not configured'};
try{const r=await fetch(this.scriptUrl+'?action=load');if(!r.ok)return{success:false,error:'HTTP '+r.status};const d=await r.json();return{success:true,data:d.contacts||[]}}
catch(e){return{success:false,error:e.message}}
},
async testConnection(){
if(!this.isConfigured())return{success:false,error:'Not configured'};
try{await fetch(this.scriptUrl+'?action=test');return{success:true}}
catch(e){return{success:false,error:e.message}}
}
};
function App(){
const[contacts,setContacts]=useState([]);
const[view,setView]=useState('dashboard');
const[filter,setFilter]=useState(null);
const[selected,setSelected]=useState(null);
const[showAdd,setShowAdd]=useState(false);
const[showSetup,setShowSetup]=useState(false);
const[showSettings,setShowSettings]=useState(false);
const[search,setSearch]=useState('');
const[syncStatus,setSyncStatus]=useState('not-configured');
const[followUpDays,setFollowUpDays]=useState(parseInt(localStorage.getItem('followUpDays'))||3);
useEffect(()=>{
const saved=localStorage.getItem('crmContacts');
if(saved)setContacts(JSON.parse(saved));
if(CloudSync.isConfigured())loadCloud();
else setSyncStatus('not-configured');
},[]);
const save=(nc)=>{localStorage.setItem('crmContacts',JSON.stringify(nc));doSync(nc)};
const doSync=async(data)=>{
if(!CloudSync.isConfigured())return;
setSyncStatus('syncing');
const r=await CloudSync.sync(data);
if(r.success){setSyncStatus('synced');setTimeout(()=>setSyncStatus('idle'),2000)}else setSyncStatus('error');
};
const loadCloud=async()=>{
setSyncStatus('syncing');
const r=await CloudSync.load();
if(r.success&&r.data.length>0){setContacts(r.data);localStorage.setItem('crmContacts',JSON.stringify(r.data));setSyncStatus('synced');setTimeout(()=>setSyncStatus('idle'),2000)}
else setSyncStatus(r.success?'idle':'error');
};
const addContact=(data)=>{
const nc=[...contacts,{id:Date.now(),...data,stage:'new',communications:[],createdAt:new Date().toISOString()}];
setContacts(nc);save(nc);setShowAdd(false);
};
const updateContact=(id,updates)=>{
const nc=contacts.map(c=>c.id===id?{...c,...updates}:c);
setContacts(nc);save(nc);
if(selected&&selected.id===id)setSelected({...selected,...updates});
};
const deleteContact=(id)=>{
if(confirm('Delete this contact?')){const nc=contacts.filter(c=>c.id!==id);setContacts(nc);save(nc);setSelected(null)}
};
const addComm=(cid,comm)=>{
const c=contacts.find(c=>c.id===cid);
updateContact(cid,{communications:[...(c.communications||[]),{id:Date.now(),...comm}]});
};
const goFiltered=(f)=>{setFilter(f);setView('contacts');setSelected(null);setSearch('')};
const searched=contacts.filter(c=>{const t=search.toLowerCase();return c.name?.toLowerCase().includes(t)||c.email?.toLowerCase().includes(t)||c.company?.toLowerCase().includes(t)||c.phone?.toLowerCase().includes(t)});
const filtered=filter==='active'?searched.filter(c=>!INACTIVE.includes(c.stage)):filter==='won'?searched.filter(c=>c.stage==='won'):searched;
const stats={total:contacts.length,active:contacts.filter(c=>!INACTIVE.includes(c.stage)).length,won:contacts.filter(c=>c.stage==='won').length};
const syncLabel=!CloudSync.isConfigured()?'Not Connected':syncStatus==='syncing'?'Syncing...':syncStatus==='synced'?'Synced ✓':syncStatus==='error'?'Sync Error':'Connected';
const syncDot=!CloudSync.isConfigured()?'not-configured':syncStatus==='syncing'?'syncing':syncStatus==='error'?'error':'';
return(
<div className="app-container">
<div className="header">
<h1>🏢 Self Storage Acquisition Tracker</h1>
<div className="header-stats">
<div className="stat" title="View all properties" onClick={()=>goFiltered(null)}>
<div className="stat-value">{stats.total}</div><div className="stat-label">Total Properties</div>
</div>
<div className="stat" title="View active prospects" onClick={()=>goFiltered('active')}>
<div className="stat-value">{stats.active}</div><div className="stat-label">Active Prospects</div>
</div>
<div className="stat" title="View deals made" onClick={()=>goFiltered('won')}>
<div className="stat-value">{stats.won}</div><div className="stat-label">Deals Made</div>
</div>
</div>
</div>
{!CloudSync.isConfigured()&&(
<div className="setup-banner">
<h3>☁️ Cloud Sync Not Configured</h3>
<p>Your data is currently saved locally only. Set up Google Sheets sync to access from any device!</p>
<button className="btn btn-warning" onClick={()=>setShowSetup(true)}>Set Up Cloud Sync</button>
</div>
)}
<div className="main-content">
<div className="sidebar">
<div className={`nav-item ${view==='dashboard'?'active':''}`} onClick={()=>{setView('dashboard');setSelected(null)}}>📊 Dashboard</div>
<div className={`nav-item ${view==='contacts'?'active':''}`} onClick={()=>{setFilter(null);setView('contacts');setSelected(null)}}>👥 All Properties</div>
<div className={`nav-item ${view==='pipeline'?'active':''}`} onClick={()=>{setView('pipeline');setSelected(null)}}>📈 Pipeline</div>
<div style={{marginTop:'auto',paddingTop:'20px',borderTop:'1px solid #e9ecef'}}>
<div className="nav-item" onClick={()=>setShowSettings(true)}>⚙️ CRM Settings</div>
<div className="nav-item" onClick={()=>setShowSetup(true)}>☁️ Cloud Sync</div>
<div className="mobile-hide-sync" style={{padding:'12px 16px',fontSize:'12px',color:'#6c757d',display:'flex',alignItems:'center',gap:'8px'}}>
<div className={`sync-dot ${syncDot}`}></div><span>{syncLabel}</span>
</div>
</div>
</div>
<div className="content-area">
{selected?(
<ContactDetail contact={selected} onClose={()=>setSelected(null)} onUpdate={(u)=>updateContact(selected.id,u)} onDelete={()=>deleteContact(selected.id)} onAddComm={(c)=>addComm(selected.id,c)} followUpDays={followUpDays}/>
):view==='dashboard'?(
<Dashboard contacts={contacts} onContactClick={setSelected} onAddContact={()=>setShowAdd(true)} followUpDays={followUpDays}/>
):view==='contacts'?(
<ContactsList contacts={filtered} search={search} onSearch={setSearch} onContactClick={setSelected} onAddContact={()=>setShowAdd(true)} filter={filter} onClearFilter={()=>setFilter(null)}/>
):(
<Pipeline contacts={contacts} onContactClick={setSelected}/>
)}
</div>
</div>
{showAdd&&<AddContactModal onClose={()=>setShowAdd(false)} onSave={addContact}/>}
{showSetup&&<SetupModal onClose={()=>setShowSetup(false)} currentUrl={CloudSync.scriptUrl} onSave={(url)=>{CloudSync.configure(url);setSyncStatus('idle');setShowSetup(false);loadCloud()}}/>}
{showSettings&&<SettingsModal onClose={()=>setShowSettings(false)} followUpDays={followUpDays} onSave={(d)=>{setFollowUpDays(d);localStorage.setItem('followUpDays',d.toString());setShowSettings(false)}}/>}
</div>
);
}
function SetupModal({onClose,onSave,currentUrl}){
const[url,setUrl]=useState(currentUrl);
const[showInst,setShowInst]=useState(false);
const[testStatus,setTestStatus]=useState('');
const[testing,setTesting]=useState(false);
const test=async()=>{
if(!url.trim()){setTestStatus('❌ Please enter a URL first');return}
setTesting(true);setTestStatus('🔄 Testing...');
try{const r=await fetch(url+'?action=test');const d=await r.json();setTestStatus(d.success?'✅ Connection successful!':'❌ Failed: '+(d.error||'Unknown'))}
catch(e){setTestStatus('❌ Error: '+e.message)}
setTesting(false);
};
return(
<div className="modal" onClick={onClose}>
<div className="modal-content" onClick={e=>e.stopPropagation()}>
<div className="modal-header"><h3 className="modal-title">☁️ Cloud Sync Setup</h3><button className="close-btn" onClick={onClose}>×</button></div>
{!showInst?(
<div>
<div className="form-group">
<label className="form-label">Google Apps Script URL</label>
<input type="url" className="form-input" value={url} onChange={e=>{setUrl(e.target.value);setTestStatus('')}} placeholder="https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec"/>
<small style={{display:'block',marginTop:'8px',color:'#6c757d'}}>Paste your Google Apps Script web app URL here</small>
</div>
{testStatus&&<div style={{padding:'12px',marginBottom:'15px',borderRadius:'8px',background:testStatus.includes('✅')?'#d4edda':testStatus.includes('🔄')?'#fff3cd':'#f8d7da',color:testStatus.includes('✅')?'#155724':testStatus.includes('🔄')?'#856404':'#721c24'}}>{testStatus}</div>}
<div style={{display:'flex',gap:'10px',marginBottom:'15px'}}>
<button type="button" className="btn btn-secondary" onClick={test} disabled={testing} style={{flex:1}}>🧪 Test Connection</button>
<button type="button" className="btn btn-success" style={{flex:1}} onClick={()=>url.trim()&&onSave(url.trim())}>Save & Sync</button>
</div>
<button type="button" className="btn btn-secondary" onClick={onClose} style={{width:'100%',marginBottom:'10px'}}>Cancel</button>
<button type="button" className="btn btn-warning" style={{width:'100%'}} onClick={()=>setShowInst(true)}>📖 Show Setup Instructions</button>
</div>
):(
<div>
<h4 style={{marginBottom:'15px'}}>Setup Instructions</h4>
<div style={{background:'#f8f9fa',padding:'15px',borderRadius:'8px',fontSize:'14px',lineHeight:'1.8'}}>
<p><strong>Step 1:</strong> Create a new Google Sheet</p>
<p><strong>Step 2:</strong> Click <strong>Extensions → Apps Script</strong></p>
<p><strong>Step 3:</strong> Delete any code and paste the provided script</p>
<p><strong>Step 4:</strong> Click <strong>💾 Save</strong></p>
<p><strong>Step 5:</strong> Click <strong>Deploy → New deployment</strong></p>
<p><strong>Step 6:</strong> Click gear icon ⚙️, select <strong>"Web app"</strong></p>
<p><strong>Step 7:</strong> Set "Who has access" to <strong>"Anyone"</strong></p>
<p><strong>Step 8:</strong> Click <strong>Deploy</strong> and authorize</p>
<p><strong>Step 9:</strong> Copy the Web app URL</p>
<p><strong>Step 10:</strong> Paste URL above and click Test Connection</p>
</div>
<button className="btn btn-secondary" style={{width:'100%',marginTop:'15px'}} onClick={()=>setShowInst(false)}>← Back</button>
</div>
)}
</div>
</div>
);
}
function SettingsModal({onClose,followUpDays,onSave}){
const[days,setDays]=useState(followUpDays);
return(
<div className="modal" onClick={onClose}>
<div className="modal-content" onClick={e=>e.stopPropagation()}>
<div className="modal-header"><h3 className="modal-title">⚙️ CRM Settings</h3><button className="close-btn" onClick={onClose}>×</button></div>
<div className="form-group">
<label className="form-label">Follow-Up Reminder (Days)</label>
<input type="number" className="form-input" value={days} onChange={e=>setDays(e.target.value)} min="1" max="365"/>
<small style={{display:'block',marginTop:'8px',color:'#6c757d'}}>Show contacts in "Needs Follow-Up" if not contacted in this many days.</small>
</div>
<div style={{background:'#e7f3ff',padding:'15px',borderRadius:'8px',marginBottom:'20px',fontSize:'14px',lineHeight:'1.6'}}>
<strong>📌 Current Setting:</strong> Contacts appear in "Needs Follow-Up" after <strong>{days} days</strong> without contact.<br/><br/>
<strong>Note:</strong> Won/Lost/Fell Through properties skip reminders unless you enable the per-property override on their detail page.
</div>
<div style={{display:'flex',gap:'10px'}}>
<button className="btn btn-secondary" onClick={onClose} style={{flex:1}}>Cancel</button>
<button className="btn btn-success" style={{flex:1}} onClick={()=>onSave(parseInt(days))}>✅ Save Settings</button>
</div>
</div>
</div>
);
}
function Dashboard({contacts,onContactClick,onAddContact,followUpDays}){
const recent=[...contacts].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).slice(0,6);
const needsFollowUp=contacts.filter(c=>{
if(INACTIVE.includes(c.stage)&&!c.followUpOverride)return false;
if(!c.communications||c.communications.length===0)return true;
const last=c.communications[c.communications.length-1];
return(Date.now()-new Date(last.date))/86400000>(c.customFollowUpDays||followUpDays);
});
return(
<div>
<div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:30}}>
<h2 style={{fontSize:24,fontWeight:700}}>Dashboard</h2>
<button className="btn btn-primary" onClick={onAddContact}>+ Add Property Owner</button>
</div>
<div style={{marginBottom:40}}>
<h3 className="section-title">🔥 Needs Follow-Up ({needsFollowUp.length})</h3>
{needsFollowUp.length>0?(
<div className="contact-grid">{needsFollowUp.slice(0,6).map(c=><ContactCard key={c.id} contact={c} onClick={()=>onContactClick(c)}/>)}</div>
):(
<div className="empty-state"><div className="empty-state-icon">✅</div><div>You're all caught up! Nice work.</div></div>
)}
</div>
<div>
<h3 className="section-title">📋 Recent Contacts</h3>
{recent.length>0?(
<div className="contact-grid">{recent.map(c=><ContactCard key={c.id} contact={c} onClick={()=>onContactClick(c)}/>)}</div>
):(
<div className="empty-state">
<div className="empty-state-icon">👋</div>
<div>No property owners yet. Add your first one to get started!</div>
<button className="btn btn-primary" onClick={onAddContact} style={{marginTop:20}}>+ Add Your First Property Owner</button>
</div>
)}
</div>
</div>
);
}
function ContactsList({contacts,search,onSearch,onContactClick,onAddContact,filter,onClearFilter}){
const label=filter==='active'?'Active Prospects':filter==='won'?'Deals Made':null;
return(
<div>
<div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
<h2 style={{fontSize:24,fontWeight:700}}>{label||'All Properties'} ({contacts.length})</h2>
<button className="btn btn-primary" onClick={onAddContact}>+ Add Property Owner</button>
</div>
{label&&(
<div className="filter-banner">
<span>🔎 Filtered by: <strong>{label}</strong></span>
<button className="btn btn-sm btn-secondary" onClick={onClearFilter} style={{marginLeft:'auto'}}>✕ Clear Filter</button>
</div>
)}
<input type="text" className="search-bar" placeholder="🔍 Search by owner name, property address, email, or phone..." value={search} onChange={e=>onSearch(e.target.value)}/>
{contacts.length>0?(
<div className="contact-grid">{contacts.map(c=><ContactCard key={c.id} contact={c} onClick={()=>onContactClick(c)}/>)}</div>
):search?(
<div className="empty-state"><div className="empty-state-icon">🔍</div><div>No properties match your search</div></div>
):(
<div className="empty-state"><div className="empty-state-icon">👋</div><div>No properties found.</div></div>
)}
</div>
);
}
function ContactCard({contact,onClick}){
return(
<div className="contact-card" onClick={onClick}>
<div className="contact-header">
<div style={{flex:1}}>
<div className="contact-name">{contact.propertyName||contact.name}</div>
{contact.propertyName&&<div className="contact-company" style={{fontSize:'13px',marginTop:'4px'}}>👤 {contact.name}</div>}
{contact.company&&<div className="contact-company">📍 {contact.company}</div>}
</div>
<span className={`stage-badge stage-${contact.stage}`}>{contact.stage}</span>
</div>
{contact.email&&<div className="contact-info">📧 {contact.email}</div>}
{contact.phone&&<div className="contact-info">📱 {contact.phone}</div>}
<div className="contact-info" style={{marginTop:12,fontSize:12}}>
📞 {contact.communications?.length||0} contacts logged
{contact.followUpOverride&&<span style={{marginLeft:8,color:'#f57c00'}}>🔔 Follow-up on</span>}
</div>
</div>
);
}
function Pipeline({contacts,onContactClick}){
const stages={
new:{label:'Not Contacted',color:'#1976d2'},
contacted:{label:'Initial Contact',color:'#7b1fa2'},
followup:{label:'Gathering Info',color:'#f57c00'},
qualified:{label:'Interested in Selling',color:'#388e3c'},
won:{label:'Deal Made',color:'#2e7d32'},
lost:{label:'Not Interested',color:'#c62828'},
fellthrough:{label:'Deal Fell Through',color:'#ff6f00'}
};
return(
<div>
<h2 style={{fontSize:24,fontWeight:700,marginBottom:30}}>Acquisition Pipeline</h2>
<div className="pipeline-board">
{Object.entries(stages).map(([key,info])=>{
const sc=contacts.filter(c=>c.stage===key);
return(
<div key={key} className="pipeline-column">
<div className="pipeline-header">
<span style={{color:info.color}}>{info.label}</span>
<span className="pipeline-count">{sc.length}</span>
</div>
<div className="pipeline-cards">
{sc.map(c=>(
<div key={c.id} className="pipeline-card" onClick={()=>onContactClick(c)}>
<div className="pipeline-card-name">{c.propertyName||c.name}</div>
{c.propertyName&&<div className="pipeline-card-company" style={{fontSize:'12px'}}>👤 {c.name}</div>}
<div className="pipeline-card-company">{c.company?'📍 '+c.company:'No address provided'}</div>
</div>
))}
{sc.length===0&&<div style={{textAlign:'center',padding:20,color:'#6c757d',fontSize:14}}>No contacts</div>}
</div>
</div>
);
})}
</div>
</div>
);
}
function ContactDetail({contact,onClose,onUpdate,onDelete,onAddComm,followUpDays}){
const[showComm,setShowComm]=useState(false);
const[showEdit,setShowEdit]=useState(false);
const[commType,setCommType]=useState('call');
const[commMsg,setCommMsg]=useState('');
const[commDate,setCommDate]=useState('');
const[editComm,setEditComm]=useState(null);
const isInactive=INACTIVE.includes(contact.stage);
const doAddComm=()=>{
if(!commMsg.trim())return;
if(editComm){
onUpdate({communications:contact.communications.map(c=>c.id===editComm.id?{...c,type:commType,message:commMsg,date:commDate||c.date}:c)});
}else{
onAddComm({type:commType,message:commMsg,date:commDate||new Date().toISOString()});
}
setCommMsg('');setCommDate('');setEditComm(null);setShowComm(false);
};
const startEdit=(comm)=>{
setEditComm(comm);setCommType(comm.type);setCommMsg(comm.message);
const d=new Date(comm.date);setCommDate(new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().slice(0,16));
setShowComm(true);
};
const closeComm=()=>{setShowComm(false);setCommMsg('');setCommDate('');setEditComm(null);setCommType('call')};
return(
<div>
<div className="detail-header">
<div>
<div className="detail-title">{contact.propertyName||contact.name}</div>
{contact.propertyName&&<div className="detail-subtitle">Owner: {contact.name}</div>}
{!contact.propertyName&&contact.company&&<div className="detail-subtitle">{contact.company}</div>}
</div>
<div style={{display:'flex',gap:'10px'}}>
<button className="btn btn-primary" onClick={()=>setShowEdit(true)}>✏️ Edit</button>
<button className="btn btn-secondary" onClick={onClose}>← Back</button>
</div>
</div>
<div className="info-grid">
<div className="info-item"><div className="info-label">Email</div><div className="info-value">📧 {contact.email||'Not provided'}</div></div>
<div className="info-item"><div className="info-label">Phone</div><div className="info-value">📱 {contact.phone||'Not provided'}</div></div>
<div className="info-item"><div className="info-label">Property Name</div><div className="info-value">🏢 {contact.propertyName||'Not provided'}</div></div>
<div className="info-item"><div className="info-label">Property Address</div><div className="info-value">📍 {contact.company||'Not provided'}</div></div>
<div className="info-item">
<div className="info-label">Property Website</div>
<div className="info-value">{contact.website?<a href={contact.website} target="_blank" rel="noopener noreferrer" style={{color:'#667eea',textDecoration:'none'}}>🌐 {contact.website}</a>:'🌐 Not provided'}</div>
</div>
<div className="info-item">
<div className="info-label">Follow-Up Reminder</div>
{isInactive?(
<div className="followup-override-box">
<label className="toggle-row">
<span className="toggle-switch">
<input type="checkbox" checked={!!contact.followUpOverride}
onChange={e=>onUpdate({followUpOverride:e.target.checked,customFollowUpDays:e.target.checked?(contact.customFollowUpDays||followUpDays):undefined})}/>
<span className="toggle-slider"></span>
</span>
<span className="toggle-label">{contact.followUpOverride?'🔔 Reminders enabled':'🔕 Reminders off'}</span>
</label>
{contact.followUpOverride&&(
<div className="override-days-row">
<input type="number" className="form-input" value={contact.customFollowUpDays||followUpDays}
onChange={e=>onUpdate({customFollowUpDays:parseInt(e.target.value)})} min="1" max="365" style={{width:'80px'}}/>
<span style={{fontSize:'14px',color:'#6c757d'}}>days between reminders</span>
</div>
)}
<div style={{marginTop:8,fontSize:12,color:'#856404'}}>
Status ({contact.stage}) normally skips follow-up reminders. Toggle to override for this property.
</div>
</div>
):(
<div style={{marginTop:8}}>
<input type="number" className="form-input" value={contact.customFollowUpDays||followUpDays}
onChange={e=>onUpdate({customFollowUpDays:parseInt(e.target.value)})} min="1" max="365" style={{width:'80px',display:'inline-block',marginRight:'8px'}}/>
<span style={{fontSize:'14px',color:'#6c757d'}}>days</span>
</div>
)}
</div>
<div className="info-item">
<div className="info-label">Status</div>
<select value={contact.stage} onChange={e=>onUpdate({stage:e.target.value})} className="form-select" style={{marginTop:8}}>
<option value="new">Not Contacted</option>
<option value="contacted">Initial Contact</option>
<option value="followup">Gathering Info</option>
<option value="qualified">Interested in Selling</option>
<option value="won">Deal Made</option>
<option value="lost">Not Interested</option>
<option value="fellthrough">Deal Fell Through</option>
</select>
</div>
</div>
{contact.notes&&(
<div style={{marginBottom:30}}>
<h3 className="section-title">📝 Property Details / Notes</h3>
<div style={{background:'#f8f9fa',padding:16,borderRadius:8}}>{contact.notes}</div>
</div>
)}
<div style={{marginBottom:30}}>
<div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
<h3 className="section-title" style={{marginBottom:0}}>📞 Contact History ({contact.communications?.length||0})</h3>
<button className="btn btn-primary btn-sm" onClick={()=>setShowComm(true)}>+ Log Contact</button>
</div>
{contact.communications&&contact.communications.length>0?(
<div className="communication-list">
{[...contact.communications].reverse().map(comm=>(
<div key={comm.id} className="communication-item">
<div className="comm-header">
<div className="comm-type">
{comm.type==='email'?'📧 Email':comm.type==='call'?'📞 Phone Call':comm.type==='social'?'📱 Social Media':comm.type==='mail'?'📬 Mail':'💬 Text Message'}
</div>
<div style={{display:'flex',gap:8,alignItems:'center'}}>
<div className="comm-date">{new Date(comm.date).toLocaleString()}</div>
<button className="btn btn-sm" style={{padding:'2px 8px',fontSize:12}} onClick={()=>startEdit(comm)}>✏️</button>
<button className="btn btn-danger btn-sm" style={{padding:'2px 8px',fontSize:12}} onClick={()=>{if(confirm('Delete this entry?'))onUpdate({communications:contact.communications.filter(c=>c.id!==comm.id)})}}>🗑️</button>
</div>
</div>
<div className="comm-message">{comm.message}</div>
</div>
))}
</div>
):(
<div className="empty-state"><div className="empty-state-icon">📞</div><div>No contacts logged yet</div></div>
)}
</div>
<div className="action-buttons">
<button className="btn btn-danger" onClick={onDelete}>🗑️ Delete Property Owner</button>
</div>
{showComm&&(
<div className="modal" onClick={closeComm}>
<div className="modal-content" onClick={e=>e.stopPropagation()}>
<div className="modal-header">
<h3 className="modal-title">{editComm?'Edit Contact':'Log Contact'}</h3>
<button className="close-btn" onClick={closeComm}>×</button>
</div>
<div className="form-group">
<label className="form-label">Contact Type</label>
<select className="form-select" value={commType} onChange={e=>setCommType(e.target.value)}>
<option value="call">📞 Phone Call</option>
<option value="email">📧 Email</option>
<option value="text">💬 Text Message</option>
<option value="social">📱 Social Media</option>
<option value="mail">📬 Mail</option>
</select>
</div>
<div className="form-group">
<label className="form-label">Date & Time</label>
<input type="datetime-local" className="form-input" value={commDate} onChange={e=>setCommDate(e.target.value)}/>
<small style={{color:'#6c757d',fontSize:12,marginTop:4,display:'block'}}>Leave blank to use current date/time</small>
</div>
<div className="form-group">
<label className="form-label">Notes</label>
<textarea className="form-textarea" value={commMsg} onChange={e=>setCommMsg(e.target.value)} placeholder="What did you discuss? Any next steps?"/>
</div>
<div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
<button className="btn btn-secondary" onClick={closeComm}>Cancel</button>
<button className="btn btn-success" onClick={doAddComm}>✅ {editComm?'Update':'Save Contact'}</button>
</div>
<div className="tip-box">💡 <strong>Pro tip:</strong> Track unit count, occupancy rate, asking price, motivation to sell, timeline, etc.</div>
</div>
</div>
)}
{showEdit&&<EditContactModal contact={contact} onClose={()=>setShowEdit(false)} onSave={u=>{onUpdate(u);setShowEdit(false)}}/>}
</div>
);
}
function AddContactModal({onClose,onSave}){
const[d,setD]=useState({name:'',propertyName:'',email:'',phone:'',company:'',website:'',notes:''});
const f=k=>e=>setD({...d,[k]:e.target.value});
return(
<div className="modal" onClick={onClose}>
<div className="modal-content" onClick={e=>e.stopPropagation()}>
<div className="modal-header"><h3 className="modal-title">Add New Property Owner</h3><button className="close-btn" onClick={onClose}>×</button></div>
<div className="form-group"><label className="form-label">Property Owner Name *</label><input type="text" className="form-input" value={d.name} onChange={f('name')}/></div>
<div className="form-group"><label className="form-label">Property Name</label><input type="text" className="form-input" value={d.propertyName} onChange={f('propertyName')} placeholder="e.g., ABC Self Storage"/></div>
<div className="form-group"><label className="form-label">Email</label><input type="email" className="form-input" value={d.email} onChange={f('email')}/></div>
<div className="form-group"><label className="form-label">Phone</label><input type="tel" className="form-input" value={d.phone} onChange={f('phone')}/></div>
<div className="form-group"><label className="form-label">Property Address</label><input type="text" className="form-input" value={d.company} onChange={f('company')} placeholder="123 Storage Lane, City, State"/></div>
<div className="form-group"><label className="form-label">Property Website</label><input type="url" className="form-input" value={d.website} onChange={f('website')} placeholder="https://www.example.com"/></div>
<div className="form-group"><label className="form-label">Property Details / Notes</label><textarea className="form-textarea" value={d.notes} onChange={f('notes')} placeholder="Unit count, square footage, current occupancy, asking price, owner's motivation, etc."/></div>
<div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
<button className="btn btn-secondary" onClick={onClose}>Cancel</button>
<button className="btn btn-primary" onClick={()=>d.name&&onSave(d)}>+ Add Contact</button>
</div>
</div>
</div>
);
}
function EditContactModal({contact,onClose,onSave}){
const[d,setD]=useState({name:contact.name||'',propertyName:contact.propertyName||'',email:contact.email||'',phone:contact.phone||'',company:contact.company||'',website:contact.website||'',notes:contact.notes||''});
const f=k=>e=>setD({...d,[k]:e.target.value});
return(
<div className="modal" onClick={onClose}>
<div className="modal-content" onClick={e=>e.stopPropagation()}>
<div className="modal-header"><h3 className="modal-title">Edit Property Owner</h3><button className="close-btn" onClick={onClose}>×</button></div>
<div className="form-group"><label className="form-label">Property Owner Name *</label><input type="text" className="form-input" value={d.name} onChange={f('name')}/></div>
<div className="form-group"><label className="form-label">Property Name</label><input type="text" className="form-input" value={d.propertyName} onChange={f('propertyName')} placeholder="e.g., ABC Self Storage"/></div>
<div className="form-group"><label className="form-label">Email</label><input type="email" className="form-input" value={d.email} onChange={f('email')}/></div>
<div className="form-group"><label className="form-label">Phone</label><input type="tel" className="form-input" value={d.phone} onChange={f('phone')}/></div>
<div className="form-group"><label className="form-label">Property Address</label><input type="text" className="form-input" value={d.company} onChange={f('company')} placeholder="123 Storage Lane, City, State"/></div>
<div className="form-group"><label className="form-label">Property Website</label><input type="url" className="form-input" value={d.website} onChange={f('website')} placeholder="https://www.example.com"/></div>
<div className="form-group"><label className="form-label">Property Details / Notes</label><textarea className="form-textarea" value={d.notes} onChange={f('notes')} placeholder="Unit count, square footage, current occupancy, asking price, owner's motivation, etc."/></div>
<div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
<button className="btn btn-secondary" onClick={onClose}>Cancel</button>
<button className="btn btn-success" onClick={()=>d.name&&onSave(d)}>✅ Save Changes</button>
</div>
</div>
</div>
);
}
const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
